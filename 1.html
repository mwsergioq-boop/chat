<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: Arial;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: #e5ddd5;
  }

  /* TOP BAR */
  #topbar {
    background: #075E54;
    color: white;
    padding: 14px;
    text-align: center;
    font-weight: bold;
  }

  /* CHAT */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
  }

  /* MESSAGE BUBBLE */
  .msg {
    max-width: 75%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 12px;
    word-wrap: break-word;
    display: flex;
    flex-direction: column;
  }

  .me {
    background: #DCF8C6;
    margin-left: auto;
    border-bottom-right-radius: 0;
  }

  .other {
    background: white;
    margin-right: auto;
    border-bottom-left-radius: 0;
  }

  .name {
    font-size: 12px;
    font-weight: bold;
    margin-bottom: 3px;
    color: #555;
  }

  /* INPUT AREA */
  .input-area {
    display: flex;
    padding: 10px;
    background: #f0f0f0;
  }

  input {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 20px;
    outline: none;
    font-size: 16px;
  }

  button {
    margin-left: 8px;
    padding: 12px 16px;
    background: #075E54;
    color: white;
    border: none;
    border-radius: 50%;
    font-size: 16px;
  }

  button:active {
    transform: scale(0.95);
  }
</style>
</head>

<body>

<div id="topbar">💬 Private Chat</div>

<div id="chat"></div>

<div class="input-area">
  <input id="msg" placeholder="Написать сообщение...">
  <button onclick="send()">➤</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCKAuV9Wor_L8NA0IeISL1pQ2ZYye_b2fI",
  authDomain: "chat-app-7bb2e.firebaseapp.com",
  databaseURL: "https://chat-app-7bb2e-default-rtdb.firebaseio.com",
  projectId: "chat-app-7bb2e",
  storageBucket: "chat-app-7bb2e.appspot.com",
  messagingSenderId: "42361874631",
  appId: "1:42361874631:web:ed327d978c9b52778bb6e2"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const chat = document.getElementById("chat");

let user = prompt("Введите имя (Сережа или Дана):");

const allowed = ["Сережа", "Дана"];

if (!allowed.includes(user)) {
  alert("Только Сережа и Дана!");
  location.reload();
}

/* SEND */
window.send = function () {
  const input = document.getElementById("msg");
  const text = input.value;

  if (text.trim() === "") return;

  push(ref(db, "messages"), {
    name: user,
    text: text,
    time: Date.now()
  });

  input.value = "";
};

/* RECEIVE */
onChildAdded(ref(db, "messages"), (data) => {
  const m = data.val();

  const div = document.createElement("div");

  div.classList.add("msg");

  if (m.name === user) {
    div.classList.add("me");
  } else {
    div.classList.add("other");
  }

  div.innerHTML = `
    <div class="name">${m.name}</div>
    <div>${m.text}</div>
  `;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
});

</script>

</body>
</html>

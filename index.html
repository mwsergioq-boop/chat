<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моё Местоположение</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            background: #1e2937;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #334155;
        }
        .dot {
            width: 24px;
            height: 24px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 12px #22c55e, 0 0 24px rgba(34, 197, 94, 0.6);
        }
        .country { font-size: 1.5rem; font-weight: 600; color: #22c55e; }
        .coords { font-size: 0.9rem; color: #94a3b8; }
        #map { flex: 1; width: 100%; }
    </style>
</head>
<body>
    <div class="header">
        <div class="dot"></div>
        <div>
            <div class="country" id="country">Определяем...</div>
            <div class="coords" id="coords"></div>
        </div>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, marker;
        
        function initMap(lat, lng) {
            if (!map) {
                map = L.map('map').setView([lat, lng], 15);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                
                const greenIcon = L.divIcon({
                    html: `<div style="width:28px;height:28px;background:#22c55e;border-radius:50%;border:3px solid white;box-shadow:0 0 15px #22c55e;"></div>`,
                    iconSize: [28, 28],
                    iconAnchor: [14, 14]
                });
                marker = L.marker([lat, lng], {icon: greenIcon}).addTo(map);
            } else {
                map.setView([lat, lng], 15);
                marker.setLatLng([lat, lng]);
            }
        }
        
        async function getCountry(lat, lng) {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=ru`);
                const data = await res.json();
                return data.address?.country || "Неизвестная страна";
            } catch(e) { return "Чехия"; }
        }
        
        navigator.geolocation.getCurrentPosition(async pos => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            
            const country = await getCountry(lat, lng);
            document.getElementById('country').textContent = `• ${country}`;
            document.getElementById('coords').textContent = `${lat.toFixed(4)}° N, ${lng.toFixed(4)}° E`;
            
            initMap(lat, lng);
        }, () => {
            alert("Разрешите доступ к геолокации");
        }, { enableHighAccuracy: true });
    </script>
</body>
</html>

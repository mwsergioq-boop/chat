<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mobile Chat</title>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: Arial;
    height: 100vh;
    background: #f2f2f2;
  }

  /* 🔐 LOGIN */
  #login {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: #fff;
  }

  #login input {
    width: 85%;
    max-width: 300px;
    padding: 14px;
    margin: 6px;
    font-size: 16px;
    border-radius: 10px;
    border: 1px solid #ccc;
  }

  #login button {
    width: 85%;
    max-width: 300px;
    padding: 14px;
    font-size: 16px;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 10px;
  }

  /* 💬 CHAT SCREEN */
  #chatScreen {
    display: none;
    height: 100vh;
    flex-direction: column;
  }

  /* TOP BAR */
  #topbar {
    background: #4CAF50;
    color: white;
    padding: 12px;
    text-align: center;
    font-weight: bold;
  }

  /* CHAT */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    background: #e9ecef;
  }

  .msg {
    max-width: 75%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 12px;
    word-wrap: break-word;
  }

  .me {
    background: #DCF8C6;
    margin-left: auto;
  }

  .other {
    background: #fff;
    margin-right: auto;
  }

  .name {
    font-size: 12px;
    font-weight: bold;
    color: #555;
  }

  /* INPUT */
  .input-area {
    display: flex;
    padding: 10px;
    background: #fff;
    border-top: 1px solid #ccc;
  }

  .input-area input {
    flex: 1;
    padding: 12px;
    font-size: 16px;
    border: 1px solid #ccc;
    border-radius: 20px;
    outline: none;
  }

  .input-area button {
    margin-left: 8px;
    padding: 12px 16px;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 50%;
    font-size: 16px;
  }
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="login">
  <h3>Вход в чат</h3>
  <input id="name" placeholder="Имя (Сережа / Дана)">
  <input id="code" placeholder="Код (1234)">
  <button onclick="login()">Войти</button>
</div>

<!-- 💬 CHAT -->
<div id="chatScreen">

  <div id="topbar">💬 Private Chat</div>

  <div id="chat"></div>

  <div class="input-area">
    <input id="msg" placeholder="Сообщение...">
    <button onclick="send()">➤</button>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCKAuV9Wor_L8NA0IeISL1pQ2ZYye_b2fI",
  authDomain: "chat-app-7bb2e.firebaseapp.com",
  databaseURL: "https://chat-app-7bb2e-default-rtdb.firebaseio.com",
  projectId: "chat-app-7bb2e",
  storageBucket: "chat-app-7bb2e.appspot.com",
  messagingSenderId: "42361874631",
  appId: "1:42361874631:web:ed327d978c9b52778bb6e2"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const chat = document.getElementById("chat");

const CHAT_CODE = "1234";
const allowed = ["Сережа", "Дана"];

let user = "";

/* 🔐 LOGIN */
window.login = function () {
  const name = document.getElementById("name").value.trim();
  const code = document.getElementById("code").value;

  if (!allowed.includes(name)) {
    alert("Только Сережа и Дана!");
    return;
  }

  if (code !== CHAT_CODE) {
    alert("Неверный код!");
    return;
  }

  user = name;

  document.getElementById("login").style.display = "none";
  document.getElementById("chatScreen").style.display = "flex";
};

/* 💬 SEND */
window.send = function () {
  const input = document.getElementById("msg");
  const text = input.value;

  if (text.trim() === "") return;

  push(ref(db, "messages"), {
    name: user,
    text: text,
    time: Date.now()
  });

  input.value = "";
};

/* 📡 RECEIVE */
onChildAdded(ref(db, "messages"), (data) => {
  const m = data.val();

  const div = document.createElement("div");

  div.classList.add("msg");

  if (m.name === user) {
    div.classList.add("me");
  } else {
    div.classList.add("other");
  }

  div.innerHTML = `<div class="name">${m.name}</div>${m.text}`;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
});

</script>

</body>
</html>

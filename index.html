<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Our</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; }
        body {
            height: 100dvh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            color: white;
            background: #000;
        }
        .background {
            position: fixed; inset: 0;
            background-image: url("photo.JPG");
            background-size: cover; background-position: center;
            filter: blur(20px) brightness(0.9); transform: scale(1.1);
            z-index: 0;
        }
        .overlay {
            position: fixed; inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,.35), rgba(0,0,0,.85));
            z-index: 1;
        }
        .header {
            position: absolute; top: env(safe-area-inset-top); left: 0;
            padding: 22px; z-index: 10;
            display: flex; gap: 12px; align-items: flex-start;
            width: 100%; pointer-events: none;
        }
        .location-card {
            display: flex; flex-direction: column;
            padding: 18px 22px;
            background: linear-gradient(150deg, rgba(255,255,255,.18), rgba(255,255,255,.08));
            border: 1px solid rgba(255,255,255,.25);
            border-radius: 24px;
            backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
            box-shadow: 0 14px 40px rgba(0,0,0,.35), inset 0 1px 2px rgba(255,255,255,.2);
            pointer-events: auto;
            min-width: 220px;
            max-width: 300px;
        }
        .status {
            display: flex; align-items: center; gap: 10px;
            font-size: 11px; font-weight: 500; letter-spacing: .12em;
            color: rgba(255,255,255,.75); margin-bottom: 12px;
        }
        .dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: #22c55e; box-shadow: 0 0 16px #22c55e;
            animation: pulse 1.8s infinite cubic-bezier(0.4, 0, 0.6, 1);
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,.6); }
            50% { box-shadow: 0 0 0 8px rgba(34,197,94,0); }
        }
        .location-info {
            display: flex; flex-direction: column;
        }
        .place { display: flex; align-items: center; gap: 9px; font-size: 23px; font-weight: 600; line-height: 1.1; }
        .pin { font-size: 18px; opacity: 0.95; }
        .country { margin-top: 5px; font-size: 14.5px; color: rgba(255,255,255,.65); opacity: 0.9; }
        .main {
            position: fixed; inset: 0;
            display: flex; justify-content: center; align-items: center;
            z-index: 5;
            padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom);
            pointer-events: none;
        }
        .days {
            font-size: 8rem; font-weight: 700; letter-spacing: -5px;
            text-shadow: 0 0 40px rgba(255,255,255,.35);
        }
        @media(max-width:700px) { .days { font-size: 6rem; } }
        .help-btn {
            width: 46px; height: 46px; border-radius: 50%;
            border: 1px solid rgba(255,255,255,.22);
            background: linear-gradient(135deg, rgba(255,255,255,.18), rgba(255,255,255,.05));
            backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
            color: white; font-size: 21px; font-weight: 600;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 40px rgba(0,0,0,.35), inset 0 1px 1px rgba(255,255,255,.25);
            transition: transform .2s ease; flex-shrink: 0;
            pointer-events: auto; -webkit-tap-highlight-color: transparent;
        }
        .help-btn:active { transform: scale(.92); }
        .modal-overlay {
            position: fixed; inset: 0; z-index: 1000;
            display: flex; justify-content: center; align-items: center;
            background: rgba(0,0,0,.6);
            backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
            opacity: 0; visibility: hidden;
            transition: opacity .25s ease, visibility .25s;
        }
        .modal-overlay.active {
            opacity: 1; visibility: visible;
        }
        .modal-content {
            max-width: 340px; width: calc(100% - 40px);
            padding: 24px; border-radius: 20px;
            background: linear-gradient(135deg, rgba(30,30,35,.95), rgba(15,15,20,.95));
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,.15);
            box-shadow: 0 20px 60px rgba(0,0,0,.6);
            transform: translateY(10px) scale(.96);
            transition: transform .25s ease-out;
        }
        .modal-overlay.active .modal-content {
            transform: translateY(0) scale(1);
        }
        .dialog-title {
            font-size: 18px; font-weight: 600; margin-bottom: 14px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .dialog-close {
            background: rgba(255,255,255,.1); border: none; color: white;
            width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
            font-size: 16px; display: flex; align-items: center; justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }
        .version-tag {
            display: inline-block; padding: 3px 8px; border-radius: 8px;
            background: rgba(34,197,94,.2); color: #22c55e;
            font-size: 11px; font-weight: 600; margin-left: 8px; letter-spacing: .05em;
        }
        .changelog { list-style: none; padding: 0; margin: 0; }
        .changelog li {
            padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,.08);
            font-size: 14px; line-height: 1.5; color: rgba(255,255,255,.85);
            display: flex; gap: 10px;
        }
        .changelog li:last-child { border-bottom: none; }
        .changelog li::before {
            content: "•"; color: #22c55e; font-size: 18px; line-height: 1; flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="overlay"></div>
    <div class="header">
        <div class="location-card">
            <div class="status"><div class="dot"></div>CURRENT LOCATION</div>
            <div class="location-info">
                <div class="place"><span class="pin">•</span><span id="city">Определяем...</span></div>
                <div class="country" id="country"></div>
            </div>
        </div>
        <button class="help-btn" id="helpBtn" aria-label="Что нового">?</button>
    </div>
    <div class="main"><div class="days" id="days">0</div></div>
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <div class="dialog-title">
                <span>Vtest 1.1<span class="version-tag">v2.0</span></span>
                <button class="dialog-close" id="dialogClose" aria-label="Закрыть">✕</button>
            </div>
            <ul class="changelog">
                <li>test glass</li>
                <li>geo</li>
                <li>plint</li>
                <li>pht</li>
            </ul>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const modal = document.getElementById("modalOverlay"), helpBtn = document.getElementById("helpBtn"), closeBtn = document.getElementById("dialogClose");
            const toggleModal = (show) => modal.classList.toggle("active", show);
            if (helpBtn) helpBtn.addEventListener("click", (e) => { e.preventDefault(); e.stopPropagation(); toggleModal(true); });
            if (closeBtn) closeBtn.addEventListener("click", () => toggleModal(false));
            if (modal) modal.addEventListener("click", (e) => e.target === modal && toggleModal(false));
            document.addEventListener("keydown", (e) => e.key === "Escape" && modal.classList.contains("active") && toggleModal(false));

            const updateDays = () => {
                const start = new Date(2026, 2, 29), today = new Date();
                document.getElementById("days").textContent = Math.ceil((today - start) / 8.64e7);
            };
            updateDays(); setInterval(updateDays, 6e5);

            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(
                    async (pos) => {
                        try {
                            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&format=json&accept-language=ru`);
                            const {address={}} = await res.json();
                            const cityEl = document.getElementById("city"), countryEl = document.getElementById("country");
                            if (cityEl) cityEl.textContent = address.city || address.town || address.village || address.suburb || "Неизвестно";
                            if (countryEl) countryEl.textContent = address.country || "";
                        } catch { document.getElementById("city").textContent = "Чехия"; }
                    },
                    () => { document.getElementById("city").textContent = "Геолокация откл."; }
                );
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моё Местоположение</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #e2e8f0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .header {
            background: #0a0a0a;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #222;
            flex-shrink: 0;
        }
        
        .dot {
            width: 16px;
            height: 16px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 12px #22c55e,
                        0 0 22px rgba(34, 197, 94, 0.8);
        }
        
        .country {
            font-size: 1.45rem;
            font-weight: 600;
            color: #22c55e;
        }
        
        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 8px;
            text-align: center;
        }
        
        .days {
            font-size: 6.5rem;
            font-weight: 700;
            color: #22c55e;
            line-height: 1;
            letter-spacing: -4px;
        }
        
        .label {
            font-size: 1.1rem;
            color: #555;
            margin-top: 10px;
        }
        
        .coords {
            font-size: 0.9rem;
            color: #444;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="dot"></div>
        <div class="country" id="country">Определяем...</div>
    </div>
    
    <div class="main">
        <div class="days" id="days">0</div>
        <div class="label">дней с 29.02.2026</div>
        <div class="coords" id="coords"></div>
    </div>

    <script>
        // Расчёт дней с 29 февраля 2026
        function calculateDays() {
            const startDate = new Date(2026, 1, 29); // 2026-02-29
            const today = new Date();
            
            const diffTime = Math.abs(today - startDate);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            document.getElementById('days').textContent = diffDays;
        }

        async function getCountry(lat, lng) {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=ru`);
                const data = await res.json();
                return data.address?.country || "Неизвестно";
            } catch(e) {
                return "Чехия";
            }
        }

        navigator.geolocation.getCurrentPosition(async (pos) => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            
            const country = await getCountry(lat, lng);
            document.getElementById('country').textContent = `• ${country}`;
            document.getElementById('coords').textContent = `${lat.toFixed(4)}° N, ${lng.toFixed(4)}° E`;
        }, () => {
            document.getElementById('country').textContent = "• Местоположение";
        });

        // Запускаем счётчик
        calculateDays();
        // Обновляем каждые сутки (на всякий случай)
        setInterval(calculateDays, 600000); // каждые 10 минут
    </script>
</body>
</html>

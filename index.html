<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no,maximum-scale=1">
    <meta name="theme-color" content="#000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    <link rel="preconnect" href="https://nominatim.openstreetmap.org">
    <title>Our</title>
    <style>
        :root{
            --glass:rgba(255,255,255,.06);--glass-active:rgba(255,255,255,.12);
            --blur:20px;--ease:cubic-bezier(.4,0,.2,1);
        }
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        html,body{width:100%;height:100%;overscroll-behavior:none}
        body{
            height:100dvh;overflow:hidden;
            font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
            color:#fff;background:#000;
            -webkit-font-smoothing:antialiased;
            -webkit-touch-callout:none;
            touch-action:manipulation;
        }
        .bg{
            position:fixed;inset:-20px;
            background:url("photo.JPG") center/cover no-repeat;
            filter:brightness(.4) saturate(1.1);
            z-index:0;
            transform:translate3d(0,0,0);
            transition:transform .15s ease-out;
        }
        .overlay{
            position:fixed;inset:0;
            background:linear-gradient(180deg,rgba(0,0,0,.3) 0%,transparent 50%,rgba(0,0,0,.5) 100%);
            z-index:0;pointer-events:none;
        }
        .wrap{
            position:relative;width:100%;height:100%;
            display:flex;flex-direction:column;justify-content:space-between;
            padding:calc(16px + env(safe-area-inset-top)) 20px calc(20px + env(safe-area-inset-bottom));
            max-width:500px;margin:0 auto;z-index:1;
        }
        .loc{
            display:flex;align-items:center;gap:8px;
            padding:10px 16px;
            background:var(--glass);border-radius:20px;
            -webkit-backdrop-filter:blur(var(--blur));backdrop-filter:blur(var(--blur));
            align-self:flex-start;
            transition:transform .2s var(--ease),background .2s;
            cursor:pointer;user-select:none;-webkit-user-select:none;
            box-shadow:0 8px 32px rgba(0,0,0,.3);
        }
        .loc:active{transform:scale(.92);background:var(--glass-active)}
        .dot{
            width:6px;height:6px;
            background:#22c55e;border-radius:50%;
            box-shadow:0 0 8px #22c55e;
            animation:pulse 2s ease-in-out infinite;
            flex-shrink:0;
        }
        @keyframes pulse{
            0%,100%{opacity:1;transform:scale(1)}
            50%{opacity:.6;transform:scale(1.15)}
        }
        .loc-txt{
            font-size:13px;font-weight:500;opacity:.9;
            white-space:nowrap;
        }
        .skeleton{
            width:80px;height:13px;
            background:linear-gradient(90deg,rgba(255,255,255,.1) 25%,rgba(255,255,255,.2) 50%,rgba(255,255,255,.1) 75%);
            background-size:200% 100%;
            border-radius:4px;
            animation:shimmer 1.5s infinite;
        }
        @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
        .center{
            flex:1;display:flex;flex-direction:column;
            align-items:center;justify-content:center;gap:28px;
        }
        .counter{
            display:flex;flex-direction:column;align-items:center;gap:6px;
            opacity:0;animation:fadeUp .8s var(--ease) forwards;
        }
        .counter:nth-child(1){animation-delay:.1s}
        .counter:nth-child(3){animation-delay:.3s}
        @keyframes fadeUp{
            from{opacity:0;transform:translateY(20px)}
            to{opacity:1;transform:translateY(0)}
        }
        .num{
            font-weight:700;letter-spacing:-5px;
            text-shadow:0 2px 20px rgba(0,0,0,.3);
            font-variant-numeric:tabular-nums;
        }
        .primary .num{font-size:clamp(80px,22vw,150px)}
        .secondary{opacity:.75}
        .secondary .num{font-size:clamp(44px,12vw,72px);font-weight:600;letter-spacing:-2px}
        .label{
            font-size:11px;font-weight:500;
            letter-spacing:1.5px;text-transform:uppercase;opacity:.6;
        }
        .divider{
            width:32px;height:1px;background:rgba(255,255,255,.2);
            opacity:0;animation:fadeIn 1s var(--ease) .2s forwards;
        }
        @keyframes fadeIn{to{opacity:1}}
        @media (prefers-reduced-motion:reduce){
            *{animation-duration:.01ms!important;transition-duration:.01ms!important}
        }
    </style>
</head>
<body>
    <div class="bg" id="bg"></div>
    <div class="overlay"></div>
    <div class="wrap">
        <div class="loc" id="loc">
            <div class="dot"></div>
            <div class="loc-txt" id="locTxt"><div class="skeleton"></div></div>
        </div>
        <div class="center">
            <div class="counter primary">
                <div class="num" id="daysTogether">0</div>
                <div class="label">вместе</div>
            </div>
            <div class="divider"></div>
            <div class="counter secondary">
                <div class="num" id="daysUntil">0</div>
                <div class="label">до встречи</div>
            </div>
        </div>
    </div>
    <script>
        const C={
            START:new Date(2026,2,29),
            MEET:new Date(2026,9,15),
            DAY:864e5,
            UPDATE:6e5,
            GEO_TIMEOUT:1e4,
            CACHE:"our_loc"
        };
        
        const $=id=>document.getElementById(id);
        const daysTogether=$("daysTogether"),daysUntil=$("daysUntil"),locTxt=$("locTxt"),bg=$("bg");
        
        const update=()=>{
            const now=new Date();
            const together=Math.floor((now-C.START)/C.DAY);
            const until=Math.max(0,Math.ceil((C.MEET-now)/C.DAY));
            if(daysTogether.textContent!==String(together)){
                daysTogether.textContent=together;
                navigator.vibrate?.(5);
            }
            daysUntil.textContent=until;
        };
        
        update();
        setInterval(update,C.UPDATE);
        
        // Параллакс через touch
        let startX=0,startY=0;
        document.addEventListener("touchstart",e=>{
            startX=e.touches[0].clientX;
            startY=e.touches[0].clientY;
        },{passive:true});
        
        document.addEventListener("touchmove",e=>{
            const dx=(e.touches[0].clientX-startX)*.02;
            const dy=(e.touches[0].clientY-startY)*.02;
            bg.style.transform=`translate3d(${dx}px,${dy}px,0)`;
        },{passive:true});
        
        document.addEventListener("touchend",()=>{
            bg.style.transform="translate3d(0,0,0)";
        },{passive:true});
        
        // Локация с кэшированием
        const setLoc=(text,cache=false)=>{
            locTxt.textContent=text;
            if(cache)try{localStorage.setItem(C.CACHE,JSON.stringify({text,time:Date.now()}))}catch{}
        };
        
        const getCached=()=>{
            try{
                const c=JSON.parse(localStorage.getItem(C.CACHE));
                if(c&&Date.now()-c.time<864e5){setLoc(c.text);return true}
            }catch{}
            return false;
        };
        
        getCached();
        
        if("geolocation"in navigator){
            navigator.geolocation.getCurrentPosition(
                async pos=>{
                    try{
                        const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&format=json&accept-language=ru`);
                        if(!r.ok)throw 0;
                        const{address:a={}}=await r.json();
                        setLoc(a.city||a.town||a.village||"Неизвестно",true);
                    }catch{if(!getCached())setLoc("Чехия")}
                },
                ()=>{if(!getCached())setLoc("Геолокация откл.")},
                {timeout:C.GEO_TIMEOUT,enableHighAccuracy:false,maximumAge:36e5}
            );
        }else if(!getCached()){
            setLoc("Геолокация не поддерживается");
        }
        
        // Блокировка zoom
        let lastTouch=0;
        document.addEventListener("touchend",e=>{
            const now=Date.now();
            if(now-lastTouch<=300)e.preventDefault();
            lastTouch=now;
        },{passive:false});
    </script>
</body>
</html>

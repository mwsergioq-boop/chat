<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>Our</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; }
        body {
            height: 100dvh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            color: white;
            background: #000;
            -webkit-font-smoothing: antialiased;
        }
        .background {
            position: fixed; inset: 0;
            background-image: url("photo.JPG");
            background-size: cover; background-position: center;
            filter: brightness(0.4) saturate(1.1);
            z-index: 0;
        }
        .container {
            position: relative;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: calc(16px + env(safe-area-inset-top)) 20px calc(20px + env(safe-area-inset-bottom));
            max-width: 500px;
            margin: 0 auto;
            z-index: 1;
        }
        .location {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            align-self: flex-start;
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .location:active { transform: scale(0.94); }
        .dot {
            width: 6px; height: 6px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 8px #22c55e;
        }
        .location-text {
            font-size: 13px;
            font-weight: 500;
            opacity: 0.9;
        }
        .center {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 28px;
        }
        .counter {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .counter.primary .number {
            font-size: clamp(80px, 22vw, 150px);
            font-weight: 700;
            letter-spacing: -5px;
            text-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }
        .counter.secondary {
            opacity: 0.75;
        }
        .counter.secondary .number {
            font-size: clamp(44px, 12vw, 72px);
            font-weight: 600;
            letter-spacing: -2px;
        }
        .label {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            opacity: 0.6;
        }
        .divider {
            width: 32px;
            height: 1px;
            background: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="container">
        <div class="location" id="location">
            <div class="dot"></div>
            <div class="location-text" id="locationText">Загрузка...</div>
        </div>
        <div class="center">
            <div class="counter primary">
                <div class="number" id="daysTogether">0</div>
                <div class="label">вместе</div>
            </div>
            <div class="divider"></div>
            <div class="counter secondary">
                <div class="number" id="daysUntil">0</div>
                <div class="label">до встречи</div>
            </div>
        </div>
    </div>
    <script>
        // ===== НАСТРОЙ ДАТЫ =====
        const START_DATE = new Date(2026, 2, 29);   // когда начали быть вместе
        const MEET_DATE  = new Date(2026, 9, 15);   // до какой даты считаем "до встречи"
        // ==========================

        const updateCounters = () => {
            const today = new Date();
            const together = Math.floor((today - START_DATE) / 8.64e7);
            const until = Math.ceil((MEET_DATE - today) / 8.64e7);
            document.getElementById("daysTogether").textContent = together;
            document.getElementById("daysUntil").textContent = Math.max(0, until);
        };
        updateCounters();
        setInterval(updateCounters, 6e5);

        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(
                async (pos) => {
                    try {
                        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&format=json&accept-language=ru`);
                        const {address = {}} = await res.json();
                        document.getElementById("locationText").textContent = 
                            address.city || address.town || address.village || "Неизвестно";
                    } catch { document.getElementById("locationText").textContent = "Чехия"; }
                },
                () => { document.getElementById("locationText").textContent = "Геолокация откл."; }
            );
        }
    </script>
</body>
</html>

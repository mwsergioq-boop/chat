<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Our</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


html,body{
    width:100%;
    height:100%;
}


body{
    height:100dvh;
    overflow:hidden;

    font-family:
    -apple-system,
    BlinkMacSystemFont,
    "SF Pro Display",
    "Segoe UI",
    Roboto,
    sans-serif;

    color:white;
    background:#000;
}



/* ФОН */

.background{

    position:fixed;
    inset:0;

    background-image:url("photo.JPG");

    background-size:cover;

    background-position:center;

    filter:blur(20px);

    transform:scale(1.1);

}



/* Затемнение */

.overlay{

    position:fixed;
    inset:0;

    background:
    linear-gradient(
        to bottom,
        rgba(0,0,0,.35),
        rgba(0,0,0,.85)
    );

}



/* КАРТОЧКА */

.header{

    position:absolute;

    top:env(safe-area-inset-top);

    left:0;

    padding:22px;

    z-index:2;

    display:flex;
    gap:12px;
    align-items:flex-start;

}



.location-card{

    display:inline-flex;

    flex-direction:column;


    padding:14px 18px;


    background:
    linear-gradient(
        135deg,
        rgba(255,255,255,.18),
        rgba(255,255,255,.05)
    );


    border:1px solid rgba(255,255,255,.22);


    border-radius:20px;


    backdrop-filter:blur(2px);

    -webkit-backdrop-filter:blur(2px);


    box-shadow:

    0 10px 40px rgba(0,0,0,.35),

    inset 0 1px 1px rgba(255,255,255,.25);

}



/* LIVE */

.status{

    display:flex;

    align-items:center;

    gap:8px;


    font-size:10px;

    font-weight:600;


    letter-spacing:.18em;


    color:rgba(255,255,255,.6);


    margin-bottom:8px;

}



.dot{

    width:8px;

    height:8px;


    border-radius:50%;


    background:#22c55e;


    box-shadow:

    0 0 12px #22c55e;


    animation:pulse 2s infinite;

}



@keyframes pulse{

0%{

box-shadow:0 0 0 0 rgba(34,197,94,.6);

}

70%{

box-shadow:0 0 0 10px rgba(34,197,94,0);

}

100%{

box-shadow:0 0 0 0 rgba(34,197,94,0);

}

}



/* ГОРОД */

.place{

    display:flex;

    align-items:center;

    gap:7px;


    font-size:21px;

    font-weight:600;

}


.pin{

    font-size:18px;

}



.country{

    margin-top:3px;

    font-size:13px;

    color:rgba(255,255,255,.55);

}




/* ЦЕНТР */

.main{

    position:fixed;

    inset:0;


    display:flex;

    justify-content:center;

    align-items:center;


    z-index:2;


    padding-top:env(safe-area-inset-top);

    padding-bottom:env(safe-area-inset-bottom);

}



.days{

    font-size:8rem;

    font-weight:700;


    letter-spacing:-5px;


    text-shadow:

    0 0 40px rgba(255,255,255,.35);

}



@media(max-width:700px){

.days{

    font-size:6rem;

}

}


/* КНОПКА ? */

.help-btn{
    width:44px;
    height:44px;
    border-radius:50%;
    border:1px solid rgba(255,255,255,.22);
    background:linear-gradient(135deg, rgba(255,255,255,.18), rgba(255,255,255,.05));
    backdrop-filter:blur(2px);
    -webkit-backdrop-filter:blur(2px);
    color:white;
    font-size:20px;
    font-weight:600;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 10px 40px rgba(0,0,0,.35), inset 0 1px 1px rgba(255,255,255,.25);
    transition:transform .2s ease, background .2s ease;
    flex-shrink:0;
}

.help-btn:active{
    transform:scale(.92);
}


/* ДИАЛОГ */

dialog{
    border:none;
    border-radius:20px;
    padding:24px;
    max-width:340px;
    width:calc(100% - 40px);
    background:linear-gradient(135deg, rgba(30,30,35,.95), rgba(15,15,20,.95));
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.15);
    color:white;
    box-shadow:0 20px 60px rgba(0,0,0,.6);
    font-family:inherit;
}

dialog::backdrop{
    background:rgba(0,0,0,.6);
    backdrop-filter:blur(4px);
    -webkit-backdrop-filter:blur(4px);
}

dialog[open]{
    animation:dialogIn .25s ease-out;
}

@keyframes dialogIn{
    from{ opacity:0; transform:translateY(10px) scale(.96); }
    to  { opacity:1; transform:translateY(0) scale(1); }
}

.dialog-title{
    font-size:18px;
    font-weight:600;
    margin-bottom:14px;
    display:flex;
    align-items:center;
    justify-content:space-between;
}

.dialog-close{
    background:rgba(255,255,255,.1);
    border:none;
    color:white;
    width:28px;
    height:28px;
    border-radius:50%;
    cursor:pointer;
    font-size:16px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.version-tag{
    display:inline-block;
    padding:3px 8px;
    border-radius:8px;
    background:rgba(34,197,94,.2);
    color:#22c55e;
    font-size:11px;
    font-weight:600;
    margin-left:8px;
    letter-spacing:.05em;
}

.changelog{
    list-style:none;
    padding:0;
    margin:0;
}

.changelog li{
    padding:10px 0;
    border-bottom:1px solid rgba(255,255,255,.08);
    font-size:14px;
    line-height:1.5;
    color:rgba(255,255,255,.85);
    display:flex;
    gap:10px;
}

.changelog li:last-child{
    border-bottom:none;
}

.changelog li::before{
    content:"•";
    color:#22c55e;
    font-size:18px;
    line-height:1;
    flex-shrink:0;
}

</style>

</head>

<body>


<div class="background"></div>
<div class="overlay"></div>




<div class="header">


<div class="location-card">


<div class="status">
<div class="dot"></div>
LIVE
</div>



<div class="place">
<span class="pin">•</span>

<span id="city">
Определяем...
</span>

</div>



<div class="country" id="country"></div>



</div>

<button class="help-btn" id="helpBtn" aria-label="Что нового">?</button>

</div>





<div class="main">
<div class="days" id="days">

0

</div>
</div>


<dialog id="changelogDialog">
    <div class="dialog-title">
        <span>Vtest 1.1<span class="version-tag">v2.0</span></span>
        <button class="dialog-close" id="dialogClose" aria-label="Закрыть">✕</button>
    </div>
    <ul class="changelog">
        <li>test glass</li>
        <li>geo</li>
        <li>plint</li>
        <li>pht</li>
    </ul>
</dialog>





<script>


function calculateDays(){


const start=new Date(2026,2,29);

const today=new Date();


const diff=Math.ceil(

(today-start)/(1000*60*60*24)

);


document.getElementById("days").textContent=diff;


}





navigator.geolocation.getCurrentPosition(async(pos)=>{


try{


const res=await fetch(

`https://nominatim.openstreetmap.org/reverse?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&format=json&accept-language=ru`

);



const data=await res.json();


const a=data.address||{};



document.getElementById("city").textContent=

a.city ||

a.town ||

a.village ||

a.suburb ||

"Неизвестно";



document.getElementById("country").textContent=

a.country || "";



}

catch(e){


document.getElementById("city").textContent="Чехия";


}

},()=>{


document.getElementById("city").textContent="Геолокация отключена";


});





calculateDays();


setInterval(calculateDays,600000);



// Диалог
const dialog = document.getElementById("changelogDialog");
document.getElementById("helpBtn").addEventListener("click", () => dialog.showModal());
document.getElementById("dialogClose").addEventListener("click", () => dialog.close());
dialog.addEventListener("click", (e) => {
    if (e.target === dialog) dialog.close();
});


</script>


</body>

</html>

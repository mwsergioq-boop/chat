<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCD</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #000000;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 1;
        }
        
        .days {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 22vw;
            font-weight: 600;
            line-height: 0.82;
            letter-spacing: -8px;     /* ← увеличил расстояние */
            color: #ffffff;
            text-shadow: 
                0 0 60px rgba(255,255,255,0.12),
                0 0 120px rgba(255,255,255,0.05);
            z-index: 2;
            transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            user-select: none;
        }
        
        @media (min-width: 600px) {
            .days {
                font-size: 280px;
                letter-spacing: -12px;   /* ← увеличил расстояние */
            }
        }
        
        @media (max-width: 480px) {
            .days {
                font-size: 18vw;
                letter-spacing: -4px;
            }
        }
    </style>
</head>
<body>
    <div class="days" id="days">0</div>

    <script>
        const startDate = new Date('2026-03-29 00:00:00').getTime();
        
        function updateCounter() {
            const now = new Date().getTime();
            const distance = now - startDate;
            const daysEl = document.getElementById('days');
            
            if (distance < 0) {
                daysEl.textContent = "0";
                return;
            }
            
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            
            if (daysEl.textContent !== days.toString()) {
                daysEl.style.opacity = '0.7';
                setTimeout(() => {
                    daysEl.textContent = days;
                    daysEl.style.opacity = '1';
                }, 80);
            }
        }
        
        setInterval(updateCounter, 1000);
        updateCounter();
        
        const daysEl = document.getElementById('days');
        daysEl.addEventListener('mouseenter', () => {
            daysEl.style.transform = 'scale(1.015)';
        });
        daysEl.addEventListener('mouseleave', () => {
            daysEl.style.transform = 'scale(1)';
        });
    </script>
</body>
</html>

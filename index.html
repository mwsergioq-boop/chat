<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Story</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,sans-serif;
    color:white;
    background:#000;
}


/* Фото фон */
.background{
    position:fixed;
    inset:0;
    background-image:url("photo.JPG");
    background-size:cover;
    background-position:center;
    filter:blur(6px);
    transform:scale(1.1);
}


/* Затемнение */
.overlay{
    position:fixed;
    inset:0;

    background:
        linear-gradient(
            to bottom,
            rgba(0,0,0,.55),
            rgba(0,0,0,.85)
        );
}


/* Карточка местоположения - стекло */
.header{
    position:absolute;
    top:0;
    left:0;
    padding:22px;
    z-index:2;
}


.location-card{

    display:inline-flex;
    flex-direction:column;

    padding:14px 18px;


    background:
        linear-gradient(
            135deg,
            rgba(255,255,255,.18),
            rgba(255,255,255,.05)
        );


    border:1px solid rgba(255,255,255,.22);

    border-radius:20px;


    backdrop-filter:blur(25px);
    -webkit-backdrop-filter:blur(25px);


    box-shadow:
        0 10px 40px rgba(0,0,0,.35),
        inset 0 1px 1px rgba(255,255,255,.25);

}



.status{

    display:flex;
    align-items:center;

    gap:8px;

    font-size:10px;
    font-weight:600;

    letter-spacing:.18em;

    color:rgba(255,255,255,.55);

    margin-bottom:8px;

}



.dot{

    width:8px;
    height:8px;

    border-radius:50%;

    background:#22c55e;

    box-shadow:
        0 0 12px #22c55e;

    animation:pulse 2s infinite;

}



@keyframes pulse{

    0%{
        box-shadow:0 0 0 0 rgba(34,197,94,.6);
    }

    70%{
        box-shadow:0 0 0 10px rgba(34,197,94,0);
    }

    100%{
        box-shadow:0 0 0 0 rgba(34,197,94,0);
    }

}



.city{

    font-size:21px;
    font-weight:600;

}



.region{

    color:#bbb;

    font-size:14px;

}



.country{

    color:#888;

    font-size:13px;

}



/* Центр */

.main{

    position:fixed;

    inset:0;

    display:flex;

    justify-content:center;

    align-items:center;

    z-index:2;

}



.days{

    font-size:8rem;

    font-weight:700;

    letter-spacing:-5px;


    text-shadow:

        0 0 40px rgba(255,255,255,.3);

}



@media(max-width:700px){

    .days{

        font-size:6rem;

    }

}

</style>

</head>


<body>


<div class="background"></div>

<div class="overlay"></div>



<div class="header">

<div class="location-card">


<div class="status">

<div class="dot"></div>

LIVE LOCATION

</div>


<div class="city" id="city">
Определяем...
</div>


<div class="region" id="region"></div>


<div class="country" id="country"></div>


</div>

</div>



<div class="main">

<div class="days" id="days">
0
</div>

</div>



<script>

function calculateDays(){

    const start=new Date(2026,2,29);

    const today=new Date();


    const diff=Math.ceil(
        (today-start)/(1000*60*60*24)
    );


    document.getElementById("days").textContent=diff;

}



navigator.geolocation.getCurrentPosition(async(pos)=>{

try{

    const res=await fetch(
    `https://nominatim.openstreetmap.org/reverse?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&format=json&accept-language=ru`
    );


    const data=await res.json();

    const a=data.address||{};



    document.getElementById("city").textContent=
        a.city||
        a.town||
        a.village||
        "Неизвестно";


    document.getElementById("region").textContent=
        a.state||"";


    document.getElementById("country").textContent=
        a.country||"";

}

catch(e){

    document.getElementById("city").textContent="Чехия";

}

},()=>{

    document.getElementById("city").textContent="Геолокация отключена";

});



calculateDays();

setInterval(calculateDays,600000);


</script>


</body>
</html>

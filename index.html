<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дни</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .header {
            background: #0a0a0a;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #1a1a1a;
            flex-shrink: 0;
        }
        
        .dot {
            width: 14px;
            height: 14px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 8px #22c55e;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { box-shadow: 0 0 0 12px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        
        .country {
            font-size: 1.1rem;
            font-weight: 500;
            color: #ddd;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="dot"></div>
        <div class="country" id="country">Определяем...</div>
    </div>
    
    <div class="main">
        <div class="days" id="days">0</div>
    </div>

    <script>
        function calculateDays() {
            const start = new Date(2026, 02, 29);
            const today = new Date();
            const diff = Math.ceil((today - start) / (1000 * 60 * 60 * 24));
            document.getElementById('days').textContent = diff;
        }

        // Геолокация — теперь показывает город, регион и страну
        navigator.geolocation.getCurrentPosition(async (pos) => {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&format=json&accept-language=ru`);
                const data = await res.json();
                const addr = data.address || {};

                let locationParts = [];
                
                // Город или населённый пункт
                if (addr.city) locationParts.push(addr.city);
                else if (addr.town) locationParts.push(addr.town);
                else if (addr.village) locationParts.push(addr.village);
                else if (addr.suburb) locationParts.push(addr.suburb);

                // Регион / область
                if (addr.state) locationParts.push(addr.state);
                else if (addr.region) locationParts.push(addr.region);

                // Страна
                if (addr.country) locationParts.push(addr.country);

                const locationText = locationParts.length > 0 
                    ? locationParts.join(', ') 
                    : "Чехия";

                document.getElementById('country').textContent = locationText;
            } catch(e) {
                document.getElementById('country').textContent = "Чехия";
            }
        }, () => {
            document.getElementById('country').textContent = "Чехия";
        });

        calculateDays();
        setInterval(calculateDays, 600000);
    </script>
</body>
</html>

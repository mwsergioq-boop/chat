<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #000000;
            color: #ffffff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        
        /* Лёгкая сетка для ровности */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 1;
        }
        
        .container {
            text-align: center;
            z-index: 2;
            position: relative;
        }
        
        .days {
            font-size: 18vw;
            font-weight: bold;
            line-height: 1;
            letter-spacing: -8px;
            font-family: Arial, sans-serif;
        }
        
        @media (min-width: 600px) {
            .days {
                font-size: 220px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="days" id="days">000</div>
    </div>

    <script>
        // ========== ИЗМЕНИ ДАТУ ЗДЕСЬ ==========
        const targetDate = new Date('2026-03-29 23:59:59').getTime();
        // =======================================

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;
            
            const daysEl = document.getElementById('days');
            
            if (distance < 0) {
                daysEl.textContent = "0";
                return;
            }
            
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            daysEl.textContent = days;
        }
        
        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>

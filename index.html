DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no,maximum-scale=1">
    <meta name="theme-color" content="#000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    <link rel="preconnect" href="https://nominatim.openstreetmap.org">
    <title>Our</title>
    <style>
        :root{
            --glass:rgba(255,255,255,.04);--glass-active:rgba(255,255,255,.08);
            --blur:30px;--ease:cubic-bezier(.4,0,.2,1);
            --accent:#22c55e;--accent-glow:rgba(34,197,94,.4);
        }
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        html,body{width:100%;height:100%;overscroll-behavior:none}
        body{
            height:100dvh;overflow:hidden;
            font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
            color:#fffbackground:#000;
            -webkit-font-smoothing:antialiased;
            -webkit-touch-callout:none;
            touch-action:manipulation;
        }
        .bg{
            position:fixed;inset:-40px;
            background:url("photo.JPG") center/cover no-repeat;
            filter:brightness(.28) saturate(1.3) contrast(1.1);
            z-index:0;
            transform:translate3d(0,0,0);
            transition:transform .25s cubic-bezier(.25,.46,.45,.94);
        }
        .bg::before{
            content:"";position:absolute;inset:0;
            background:
                radial-gradient(circle at 30% 20%,rgba(120,80,255,.15) 0%,transparent 50%),
                radial-gradient(circle at 70% 80%,rgba(255,100,150,.1) 0%,transparent 50%),
                radial-gradient(ellipse at 50% 50%,transparent 0%,rgba(0,0,0,.6) 100%);
            mix-blend-mode:screen;
        }
        .bg::after{
            content:"";position:absolute;inset:0;
            background:linear-gradient(180deg,rgba(0,0,0,.3) 0%,transparent 30%,transparent 70%,rgba(0,0,0,.8) 100%);
        }
        .noise{
            position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.04;
            background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }
        .wrap{
            position:relative;width:100%;height:100%;
            display:flex;flex-direction:column;justify-content:space-between;
            padding:calc(24px + env(safe-area-inset-top)) 28px calc(28px + env(safe-area-inset-bottom));
            max-width:500px;margin:0 auto;z-index:1;
        }
        .loc{
            position:relative;
            display:flex;align-items:center;gap:14px;
            padding:12px 20px;
            background:var(--glass);border-radius:28px;
            -webkit-backdrop-filter:blur(var(--blur));backdrop-filter:blur(var(--blur));
            align-selfflex-start;
            transition:transform .3s var(--ease),background .3s;
            :pointer;user-select:none;-webkit-user-select:none;
            overflow:hidden;
        }
        .loc::before{
            content:"";position:absolute;inset:0;
            border-radius:28px;padding:1px;
            background:linear-gradient(135deg,rgba(255,255,255,.15) 0%,rgba(255,255,255,.05) 50%,rgba(255,255,255,.15) 100%);
            -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
            -webkit-mask-composite:xor;mask-composite:exclude;
            animation:borderRotate 8s linear infinite;
        }
        @keyframes borderRotate{
            0%{background:linear-gradient(0deg,rgba(255,255,255,.15) 0%,rgba(255,255,255,.05) 50%,rgba(255,255,255,.15) 100%)}
            25%{background:linear-gradient(90deg,rgba(255,255,255,.15) 0%,rgba(255,255,255,.05) 50%,rgba(255,255,255,.15) 100%)}
            50%{background:linear-gradient(180deg,rgba(255,255,255,.15) 0%,rgba(255,255,255,.05) 50%,rgba(255,255,255,.15) 100%)}
            75%{background:linear-gradient(270deg,rgba(255,255,255,.15) 0%,rgba(255,255,255,.05) 50%,rgba(255,255,255,.15) 100%)}
            100%{background:linear-gradient(360deg,rgba(255,255,255,.15) 0%,rgba(255,255,255,.05) 50%,rgba(255,255,255,.15) 100%)}
        }
        .loc:active{transform:scale(.92);background:var(--glass-active)}
        .dot-wrap{
            position:relative;width:12px;height:12px;
            display:flex;align-items:center;justify-content:center;
        }
        .dot{
            width:7px;height:7px;
            background:var(--accent);border-radius:50%;
            position:relative;z-index:2;
            box-shadow:0 0 10px var(--accent-glow),0 0 20px var(--accent-glow);
        }
        .dot-ring{
            position:absolute;inset:-2px;
            border:2px solid var(--accent-glow);
            border-radius:50%;
            animation:ring 2.5s ease-out infinite;
        }
        .dot-ring:nth-child(2){animation-delay:.8s}
        @keyframes ring{
            0%{transform:scale(.7);opacity:1}
            100%{transform:scale(2.5);opacity:0}
        }
        .loc-txt{
            font-size:14px;font-weight:500;opacity:.98;
            white-space:nowrap;letter-spacing:.4px;
        }
        .skeleton{
            width:90px;height:14px;
            background:linear-gradient(90deg,rgba(255,255,255,.05) 25%,rgba(255,255,255,.12) 50%,rgba(255,255,255,.05) 75%);
            background-size:200% 100%;
            border-radius:6px;
            animation:shimmer 2s ease-in-out infinite;
        }
        @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
        .center{
            flex:1;display:flex;flex-direction:column;
            align-items:center;justify-content:center;gap:40px;
        }
        .counter{
            display:flex;flex-direction:column;align-items:center;gap:12px;
            opacity:0;animation:fadeUp 1.2s var(--ease) forwards;
        }
        .counter:nth-child(1){animation-delay:.2s}
        .counter:nth-child(3){animation-delay:.5s}
        @keyframes fadeUp{
            from{opacity:0;transform:translateY(40px) scale(.9)}
            to{opacity:1;transform:translateY(0) scale(1)}
        }
        .num{
            font-weight:100;letter-spacing:-10px;

            background:linear-gradient(180deg,#fff 0%,rgba(255,255,255,.65) 100%);
            -webkit-background-clip:text;background-clip:text;
            -webkit-text-fill-color:transparent;
            transition:opacity .6s var(--ease),transform .6s var(--ease);
            line-heigh:.8;
            position:relative;
        }
        .num.fade{opacity:.2;transform:scale(.95)}
        .primary .num{
            font-size:clamp(110px,32vw,200px);
            filter:drop-shadow(0 0 60px rgba(255,255,255,.08));
        }
        .secondary{opacity:.92}
        .secondary .num{
            font-size:clamp(56px,16vw,96px);
            font-weight:200;letter-spacing:-5px;
        }
        .label{
            font-size:9px;font-weight:600;
            letter-spacing:4px;text-transform:uppercase;opacity:.4;
        }
        .divider{
            position:relative;
            width:56px;height:1px;
            opacity:0;animation:fadeIn 1.4s var(--ease) .35s forwards;
        }
        .(255,255,255,.3);
        }
        @keyframes fadeIn{to{opacity:1}}
        .date-indicator{
            position:absolute;
            top:calc(24px + env(safe-area-inset-top));right:28px;
            display:flex;flex-direction:column;align-items:flex-end;gap:4px;
            opacity:0;animation:fadeIn 1s var(--ease) .6s forwards;
        }
        .date-day{
            font-size:32px;font-weight:200;
            letter-spacing:-2px;line-height:1;
            opacity:.9;
        }
        .date-month{
            font-size:10px;font-weight:600;
            letter-spacing:3px;text-transform:uppercase;
            opacity:.5;
        }
        .progress{
            position:fixed;bottom:0;left:0;right:0;
            height:2px;z-index:2;
            background:rgba(255,255,255,.03);
            overflow:hidden;
        }
        .progress-bar{
            height:100%;
            background:linear-gradient(90deg,
                rgba(120,80,255,.3) 0%,
                rgba(255,100,150,.4) 50%,
                rgba(34,197,94,.5) 100%);
            transition:width 1.5s cubic-bezier(.4,0,.2,1);
            box-shadow:0 0 12px rgba(255,255,255,.3);
            position:relative;
        }
        .progress-bar::after{
            content:"";position:absolute;
            right:0;top:50%;transform:translateY(-50%);
            width:6px;height:6px;
            background:#fff;border-radius:50%;
            box-shadow:0 0 10px rgba(255,255,255,.8);
            animation:glow 2s ease-in-out infinite;
        }
        @
        
    <div class="bg" id="bg"></div>
    <div class="noise"></div>
    <div class="wrap">
        <div class="loc" id="loc">
            <div class="dot-wrap">
                <div class="dot-ring"></div>
                <div class="dot-ring"></div>
                <div class="dot"></div>
            </div>
            <div class="loc-txt" id="locTxt"><div class="skeleton"></div></div>
        </div>
        <div class="date-indicator">
            <div class="date-day" id="dateDay">30</div>
            <div class="date-month" id="dateMonth">июня</div>
        </div>
        <div class="center">
            <div class="counter primary">
                <div class="num" id="daysTogether">0</div>
                <div class="label">вместе</div>
            </div>
            <div class="divider"></div>
            <div class="counter secondary">
                <div class="num" id="daysUntil">0</div>
                <div class="label">до встречи</div>
            </div>
        </div>
    </div>
    <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
    </div>
    <script>
        const C={
            START:new Date(2026,2,29),
            MEET:new Date(2026,9,15),
            DAY:864e5,
            UPDATE:6e5,
            GEO_TIMEOUT:1e4,
            CACHE:"our_loc",
            MONTHS:["января","февраля","марта","апреля","мая","июня","июля","августа","сентября","октября","ноября","декабря"]
        };
        
        const $=id=>document.getElementById(id);
        const daysTogether=$("daysTogether"),daysUntil=$("daysUntil"),locTxt=$("locTxt"),bg=$("bg"),progressBar=$("progressBar");
        const dateDay=$("dateDay"),dateMonth=$("dateMonth");
        
        const setNum=(el,val)=>{
            if(el.textContent!==String(val)){
                el.classLi.add("Content=C.MONTHS[now.getMonth()];
        };
        
        const update=()=>{
            const now=new Date();
            const together=Math.floor((now-C.START)/C.DAY);
            const until=Math.max(0,Math.ceil((C.MEET-now)/C.DAY));
            const total=(C.MEET-C.START)/C.DAY;
            const progress=Math.min(100,Math.max(0,((now-C.START)/C.DAY)/total*100));
            
            setNum(daysTogether,together);
            setNum(daysUntil,until);
            progressBar.style.width=progress+"%";
            updateDate();
        };
        
        update();
        setInterval(update,C.UPDATE);
        
        // Параллакс через touch
        let startX=0,startY=0;
        document.addEventListener("touchstart",e=>{
            startX=e.touches[0].clientX;
            startY=e.touches[0].clientY;
        },{
        ache)try{localStorage.setItem(C.CACHE,JSON.stringify({text,time:Date.now()}))}catch{}
        };
        
        const getCached=()=>{
            try{
                const c=JSON.parse(localStorage.getItem(C.CACHE));
                if(c&&Date.now()-c.time<864e5){setLoc(c.text);return true}
            }catch{}

            h{if(!getCached())setLoc("Чехия")}
                },
                ()=>{if(!getCached())setLoc("Геолокация откл.")},
                {timeout:C.GEO_TIMEOUT,enableHighAccuracy:false,maximumAge:36e5}
            );
        }else if(!getCached()){
            setLoc("Геолокация не поддерживается");
        }
        
        // Блокировка zoom
        let lastTouch=0;
        document.addEventListener("touchend",e=>{
            const now=Date.now();
            if(now-lastTouch<=300)e.preventDefault();
            lastTouch=now;
        },{passive:false});
    </script>
</body>
</html>

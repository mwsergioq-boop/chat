<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дни</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,sans-serif;
    background:#000;
    color:#fff;
    height:100vh;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

/* ---------- Карточка местоположения ---------- */

.header{
    padding:22px;
    flex-shrink:0;
}

.location-card{
    display:inline-flex;
    flex-direction:column;
    gap:2px;

    padding:12px 16px;

    background:rgba(255,255,255,.045);
    border:1px solid rgba(255,255,255,.07);
    border-radius:16px;

    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    box-shadow:
        inset 0 1px rgba(255,255,255,.05),
        0 8px 30px rgba(0,0,0,.35);
}

.status{
    display:flex;
    align-items:center;
    gap:8px;

    margin-bottom:6px;

    color:#8d8d93;
    font-size:11px;
    font-weight:600;
    letter-spacing:.16em;
    text-transform:uppercase;
}

.dot{
    width:8px;
    height:8px;
    border-radius:50%;
    background:#22c55e;
    box-shadow:0 0 10px #22c55e;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{
        box-shadow:0 0 0 0 rgba(34,197,94,.65);
    }
    70%{
        box-shadow:0 0 0 10px rgba(34,197,94,0);
    }
    100%{
        box-shadow:0 0 0 0 rgba(34,197,94,0);
    }
}

.city{
    font-size:21px;
    font-weight:650;
    color:#fff;
    line-height:1.15;
}

.region{
    margin-top:3px;
    font-size:14px;
    color:#b5b5b7;
}

.country{
    font-size:13px;
    color:#777;
}

/* ---------- Центр ---------- */

.main{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}

.days{
    font-size:8rem;
    font-weight:700;
    line-height:1;
    letter-spacing:-4px;
    user-select:none;
    text-shadow:0 0 30px rgba(255,255,255,.08);
}

/* ---------- Адаптация ---------- */

@media(max-width:700px){

    .days{
        font-size:6.3rem;
    }

    .city{
        font-size:19px;
    }

}
</style>
</head>

<body>

<div class="header">

    <div class="location-card">

        <div class="status">
            <div class="dot"></div>
            <span>LIVE</span>
        </div>

        <div class="city" id="city">Определяем...</div>
        <div class="region" id="region"></div>
        <div class="country" id="country"></div>

    </div>

</div>

<div class="main">
    <div class="days" id="days">0</div>
</div>

<script>

function calculateDays(){

    const start=new Date(2026,2,29);
    const today=new Date();

    const diff=Math.ceil(
        (today-start)/(1000*60*60*24)
    );

    document.getElementById("days").textContent=diff;

}

navigator.geolocation.getCurrentPosition(async(pos)=>{

    try{

        const res=await fetch(
            `https://nominatim.openstreetmap.org/reverse?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&format=json&accept-language=ru`
        );

        const data=await res.json();
        const addr=data.address||{};

        const city=
            addr.city||
            addr.town||
            addr.village||
            addr.hamlet||
            addr.suburb||
            "Неизвестно";

        const region=
            addr.state||
            addr.region||
            addr.county||
            "";

        const country=
            addr.country||
            "";

        document.getElementById("city").textContent=city;
        document.getElementById("region").textContent=region;
        document.getElementById("country").textContent=country;

    }

    catch(e){

        document.getElementById("city").textContent="Не удалось определить";
        document.getElementById("region").textContent="";
        document.getElementById("country").textContent="";

    }

},

()=>{

    document.getElementById("city").textContent="Геолокация отключена";
    document.getElementById("region").textContent="";
    document.getElementById("country").textContent="";

});

calculateDays();

setInterval(calculateDays,600000);

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Counter</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: #000;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }

    #counter {
        color: #fff;
        font-size: 15vw;
        font-family: Arial, sans-serif;
        font-weight: 700;
        user-select: none;
    }
</style>
</head>
<body>

<div id="counter"></div>

<script>
    // Дата начала отношений
    const startDate = new Date("2026-03-29T00:00:00");

    function updateCounter() {
        const now = new Date();
        const diff = now - startDate;

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));

        document.getElementById("counter").textContent = days;
    }

    updateCounter();
</script>

</body>
</html>

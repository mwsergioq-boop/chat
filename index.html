<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="CHSD - Счётчик дней вместе">
  <meta name="theme-color" content="#000000">
  <title>CHSD</title>
  <style>
    :root {
      --bg-color: #000000;
      --text-color: #ffffff;
      --subtext-color: rgba(255, 255, 255, 0.5);
      --accent-color: #ff2e93;
      --accent-light: #ff69b4;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; }

    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg-color);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      padding: 20px;
      color: var(--text-color);
    }

    body.dates-page {
      overflow-y: auto;
      justify-content: flex-start;
      padding-top: 70px;
      padding-bottom: 30px;
    }

    /* Avatar */
    .avatar-container {
      position: fixed;
      top: 35px;
      left: 35px;
      z-index: 10;
    }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid rgba(255, 255, 255, 0.3);
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .avatar:hover,
    .avatar:active {
      transform: scale(1.1);
    }

    /* Top Line - Center */
    .divider-line {
      position: fixed;
      top: 25px;
      left: 50%;
      transform: translateX(-50%);
      width: 20px;
      height: 1px;
      background: rgba(255, 255, 255, 0.15);
      z-index: 10;
      transition: background-color 0.3s ease;
      cursor: pointer;
    }

    .divider-line:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    /* Info Button */
    .info-btn {
      position: fixed;
      top: 35px;
      right: 35px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.6);
      font-size: 18px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .info-btn:hover,
    .info-btn:active {
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      border-color: rgba(255, 255, 255, 0.25);
    }

    /* Back button */
    .back-btn {
      position: fixed;
      top: 35px;
      left: 35px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.6);
      font-size: 18px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0;
      z-index: 10;
    }

    body.dates-page .back-btn {
      display: flex;
    }

    .back-btn:hover,
    .back-btn:active {
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      border-color: rgba(255, 255, 255, 0.25);
    }

    body.dates-page .avatar-container,
    body.dates-page .divider-line {
      display: none;
    }

    /* Side Menu */
    .menu-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(10px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      z-index: 200;
    }

    .menu-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .menu-content {
      position: fixed;
      left: 0;
      top: 0;
      height: 100vh;
      width: 280px;
      background: linear-gradient(180deg, #0a0a0a 0%, #0f0f0f 100%);
      border-right: 1px solid rgba(255, 46, 147, 0.1);
      padding: 50px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transform: translateX(-100%);
      transition: transform 0.4s ease;
      z-index: 201;
      overflow-y: auto;
    }

    .menu-overlay.active .menu-content {
      transform: translateX(0);
    }

    .menu-item {
      padding: 14px 16px;
      color: #fff;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      text-align: left;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 400;
      font-size: 14px;
      user-select: none;
      letter-spacing: 0.5px;
    }

    .menu-item:hover {
      background: rgba(255, 46, 147, 0.08);
      border-color: rgba(255, 46, 147, 0.2);
      transform: translateX(4px);
    }

    .menu-item:active {
      transform: translateX(2px);
    }

    /* Falling Elements */
    .falling-element {
      position: fixed;
      pointer-events: none;
      user-select: none;
      z-index: 9;
      will-change: transform, opacity;
      top: -50px;
    }

    .falling-heart {
      filter: drop-shadow(0 0 8px rgba(255, 46, 147, 0.4));
      font-size: 20px;
    }

    .falling-letter {
      font-weight: 700;
      color: #ffffff;
      text-shadow: 0 0 15px #ff2e93, 0 0 30px #ff2e93;
      font-family: 'Georgia', serif;
      font-size: 30px;
    }

    /* Counter */
    .counter-wrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      pointer-events: none;
      z-index: 5;
    }

    body.dates-page .counter-wrapper {
      display: none;
    }

    .status-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 4px;
      color: var(--accent-color);
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .counter {
      font-size: clamp(85px, 25vw, 150px);
      font-weight: 700;
      color: var(--text-color);
      animation: heartbeat 1.8s infinite alternate;
      line-height: 1;
      -webkit-user-select: none;
      user-select: none;
    }

    @keyframes heartbeat {
      0% { transform: scale(1); }
      100% { transform: scale(1.03); }
    }

    .live-timer {
      font-size: 14px;
      letter-spacing: 3px;
      color: var(--subtext-color);
      margin-top: 20px;
      text-transform: uppercase;
      font-variant-numeric: tabular-nums;
    }

    /* Initials */
    .initials {
      position: fixed;
      bottom: 35px;
      font-size: 13px;
      font-weight: 200;
      letter-spacing: 7px;
      color: rgba(255, 255, 255, 0.25);
      cursor: pointer;
      transition: color 0.3s ease;
      user-select: none;
      padding: 5px;
    }

    body.dates-page .initials {
      display: none;
    }

    .initials:active {
      color: rgba(255, 255, 255, 0.6);
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      z-index: 100;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-content {
      background: #0d0d0d;
      border: 1px solid rgba(255, 46, 147, 0.2);
      padding: 30px;
      border-radius: 24px;
      width: 85%;
      max-width: 340px;
      color: #fff;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-title {
      font-size: 19px;
      color: var(--accent-color);
      text-align: center;
      margin: 0 0 15px 0;
    }

    .modal-list {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.75);
      padding-left: 15px;
      margin-bottom: 20px;
      margin-top: 0;
    }

    .close-btn {
      width: 100%;
      padding: 12px;
      background: var(--accent-color);
      border: none;
      border-radius: 12px;
      color: white;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: opacity 0.3s ease;
    }

    .close-btn:hover,
    .close-btn:active {
      opacity: 0.9;
    }

    /* ===== DATES PAGE STYLING ===== */
    .dates-page-wrapper {
      width: 100%;
      max-width: 550px;
      display: none;
      flex-direction: column;
      gap: 28px;
      padding: 0 15px 50px;
      animation: fadeIn 0.4s ease;
    }

    .dates-page-wrapper.active {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Header */
    .dates-header {
      text-align: center;
      margin: 0;
    }

    .dates-header-title {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent-color) 0%, var(--accent-light) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0 0 8px 0;
      letter-spacing: 0.5px;
    }

    .dates-header-subtitle {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.4);
      margin: 0;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Form Container */
    .dates-form-container {
      padding: 24px;
      background: linear-gradient(135deg, rgba(255, 46, 147, 0.04) 0%, rgba(255, 46, 147, 0.01) 100%);
      border: 1px solid rgba(255, 46, 147, 0.12);
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: all 0.3s ease;
    }

    .dates-form-container:focus-within {
      border-color: rgba(255, 46, 147, 0.25);
      background: linear-gradient(135deg, rgba(255, 46, 147, 0.08) 0%, rgba(255, 46, 147, 0.03) 100%);
    }

    .dates-form-input {
      padding: 13px 16px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 46, 147, 0.15);
      border-radius: 12px;
      color: var(--text-color);
      font-size: 15px;
      font-family: inherit;
      transition: all 0.3s ease;
      letter-spacing: 0.3px;
    }

    .dates-form-input::placeholder {
      color: rgba(255, 255, 255, 0.35);
    }

    .dates-form-input:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.06);
      border-color: var(--accent-color);
      box-shadow: 0 0 0 3px rgba(255, 46, 147, 0.1);
    }

    .dates-form-input[type="date"] {
      cursor: pointer;
    }

    .dates-form-input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
      cursor: pointer;
    }

    /* Add Button */
    .dates-add-btn {
      padding: 13px 20px;
      background: linear-gradient(135deg, var(--accent-color) 0%, var(--accent-light) 100%);
      border: none;
      border-radius: 12px;
      color: white;
      cursor: pointer;
      font-weight: 600;
      font-size: 15px;
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      box-shadow: 0 4px 15px rgba(255, 46, 147, 0.25);
      margin-top: 4px;
    }

    .dates-add-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 46, 147, 0.35);
    }

    .dates-add-btn:active {
      transform: translateY(0);
    }

    /* Dates List */
    .dates-list-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .dates-list-title {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin: 0;
      padding: 0 4px;
    }

    .dates-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Date Item */
    .date-item {
      padding: 16px;
      background: linear-gradient(135deg, rgba(255, 46, 147, 0.08) 0%, rgba(255, 46, 147, 0.03) 100%);
      border: 1px solid rgba(255, 46, 147, 0.15);
      border-radius: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: default;
    }

    .date-item:hover {
      background: linear-gradient(135deg, rgba(255, 46, 147, 0.12) 0%, rgba(255, 46, 147, 0.06) 100%);
      border-color: rgba(255, 46, 147, 0.25);
      transform: translateX(4px);
    }

    .date-item-content {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-width: 0;
    }

    .date-item-name {
      color: var(--text-color);
      font-weight: 500;
      font-size: 15px;
      letter-spacing: 0.3px;
      word-break: break-word;
    }

    .date-item-date {
      color: var(--accent-color);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .date-item-btn {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.4);
      cursor: pointer;
      font-size: 20px;
      padding: 4px 8px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: 8px;
      flex-shrink: 0;
    }

    .date-item-btn:hover {
      color: #ff6b6b;
      transform: scale(1.1);
    }

    /* Empty State */
    .dates-empty {
      text-align: center;
      padding: 60px 20px;
      color: rgba(255, 255, 255, 0.25);
    }

    .dates-empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .dates-empty-text {
      font-size: 15px;
      letter-spacing: 0.5px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 46, 147, 0.2);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 46, 147, 0.4);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .counter { font-size: clamp(85px, 20vw, 120px); }
      .avatar-container { top: 25px; left: 25px; }
      .info-btn { top: 25px; right: 25px; }
      .back-btn { top: 25px; left: 25px; }
      .initials { bottom: 25px; }
      .menu-content { width: 260px; }
      .dates-page-wrapper { max-width: 100%; }
      .dates-header-title { font-size: 26px; }
    }

    @media (max-width: 480px) {
      body.dates-page {
        padding-top: 60px;
      }

      .dates-header-title { font-size: 22px; }
      .dates-form-container { padding: 18px; }
      .dates-form-input { padding: 11px 14px; font-size: 14px; }
      .date-item { padding: 14px; }
      .date-item-name { font-size: 14px; }
      .dates-empty { padding: 40px 15px; }
      .dates-empty-icon { font-size: 40px; }
    }

    /* Accessibility */
    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>

  <button class="back-btn" onclick="backToMain()" aria-label="Вернуться назад">←</button>

  <div class="avatar-container">
    <img src="https://i.ibb.co/gbzz23yg/IMG-1455.jpg" alt="Меню" class="avatar" onclick="toggleMenu()" role="button" tabindex="0">
  </div>

  <div class="divider-line" onclick="startFallingRomance()" title="Нажмите для сердечек"></div>
  <button class="info-btn" onclick="toggleModal(event)" aria-label="Информация">?</button>

  <div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()">
    <div class="menu-content" onclick="event.stopPropagation()">
      <div class="menu-item" role="button" tabindex="0">Галерея</div>
      <div class="menu-item" role="button" tabindex="0">Заметки</div>
      <div class="menu-item" role="button" tabindex="0" onclick="openDatesPage()">Дата</div>
    </div>
  </div>

  <div class="counter-wrapper">
    <div class="status-label">together</div>
    <div class="counter"><span id="count">0</span></div>
    <div class="live-timer" id="liveTimerNode">0д 0ч 0м 0с</div>
  </div>

  <div class="initials" id="initials" onclick="triggerHeartsFromInitials()" role="button" tabindex="0" title="Нажмите для сердечек">D & S</div>

  <!-- Dates Page -->
  <div class="dates-page-wrapper" id="datesPageWrapper">
    <div class="dates-header">
      <h1 class="dates-header-title">важные даты</h1>
      <p class="dates-header-subtitle">самые важные моменты</p>
    </div>
    
    <div class="dates-form-container">
      <input type="text" id="dateNameInput" class="dates-form-input" placeholder="Название даты" maxlength="30">
      <input type="date" id="dateInput" class="dates-form-input">
      <button class="dates-add-btn" onclick="addDate()">Добавить</button>
    </div>

    <div class="dates-list-container">
      <h3 class="dates-list-title">Ваши даты</h3>
      <div class="dates-list" id="datesList"></div>
    </div>
  </div>

  <div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
    <div class="modal-content">
      <h3 class="modal-title">V1.5</h3>
      <ul class="modal-list">
        <li>OPT</li>
        <li>iptin - apple (11-17)</li>
        <li>....</li>
        <li>dateOPT</li>
        <li>IPT</li>
      </ul>
      <button class="close-btn" onclick="toggleModal(event)">Понятно</button>
    </div>
  </div>

  <script>
    // Configuration
    const CONFIG = {
      startDate: new Date(2026, 2, 29),
      heartCount: 50,
      letters: ['D', 'S'],
      updateInterval: 1000,
      fallingDuration: { min: 5000, max: 8000 },
      heartsBurstCount: 10,
      heartsBurstDuration: 1000
    };

    let updateTimerInterval = null;
    let currentPage = 'main';

    // Page Management
    function openDatesPage() {
      toggleMenu();
      currentPage = 'dates';
      document.body.classList.add('dates-page');
      document.getElementById('datesPageWrapper').classList.add('active');
      renderDates();
      document.getElementById('dateNameInput').focus();
    }

    function backToMain() {
      currentPage = 'main';
      document.body.classList.remove('dates-page');
      document.getElementById('datesPageWrapper').classList.remove('active');
    }

    // Dates Management
    function loadDates() {
      const dates = localStorage.getItem('chsdDates');
      return dates ? JSON.parse(dates) : [];
    }

    function saveDates(dates) {
      localStorage.setItem('chsdDates', JSON.stringify(dates));
    }

    function addDate() {
      const nameInput = document.getElementById('dateNameInput');
      const dateInput = document.getElementById('dateInput');
      const name = nameInput.value.trim();
      const date = dateInput.value;

      if (!name || !date) {
        return;
      }

      const dates = loadDates();
      dates.push({ name, date, id: Date.now() });
      saveDates(dates);

      nameInput.value = '';
      dateInput.value = '';
      renderDates();
      nameInput.focus();
    }

    function deleteDate(id) {
      const dates = loadDates();
      const filtered = dates.filter(d => d.id !== id);
      saveDates(filtered);
      renderDates();
    }

    function renderDates() {
      const dates = loadDates();
      const datesList = document.getElementById('datesList');
      datesList.innerHTML = '';

      dates.sort((a, b) => new Date(a.date + 'T00:00:00') - new Date(b.date + 'T00:00:00'));

      if (dates.length === 0) {
        datesList.innerHTML = '<div class="dates-empty"><div class="dates-empty-icon">📌</div><div class="dates-empty-text">добавь первую дату</div></div>';
        return;
      }

      dates.forEach(date => {
        const dateObj = new Date(date.date + 'T00:00:00');
        const options = { year: 'numeric', month: 'long', day: 'numeric' };
        const formattedDate = dateObj.toLocaleDateString('ru-RU', options);

        const item = document.createElement('div');
        item.className = 'date-item';
        item.innerHTML = `
          <div class="date-item-content">
            <div class="date-item-name">${date.name}</div>
            <div class="date-item-date">${formattedDate}</div>
          </div>
          <button class="date-item-btn" onclick="deleteDate(${date.id})" title="Удалить дату">×</button>
        `;
        datesList.appendChild(item);
      });
    }

    // Event Listeners
    function setupEventListeners() {
      const avatar = document.querySelector('.avatar');
      const initials = document.getElementById('initials');
      const dividerLine = document.querySelector('.divider-line');
      const menuItems = document.querySelectorAll('.menu-item');
      const menuOverlay = document.getElementById('menuOverlay');
      const dateNameInput = document.getElementById('dateNameInput');
      const dateInput = document.getElementById('dateInput');

      avatar.addEventListener('keydown', (e) => e.key === 'Enter' && toggleMenu());
      dividerLine.addEventListener('keydown', (e) => e.key === 'Enter' && startFallingRomance());
      initials.addEventListener('keydown', (e) => e.key === 'Enter' && triggerHeartsFromInitials());

      menuItems.forEach(item => {
        item.addEventListener('keydown', (e) => e.key === 'Enter' && handleMenuItemClick(e));
        item.addEventListener('click', handleMenuItemClick);
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          if (currentPage === 'dates') {
            backToMain();
          } else if (menuOverlay.classList.contains('active')) {
            toggleMenu();
          }
        }
      });

      dateInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') addDate();
      });

      dateNameInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') addDate();
      });

      if ('ontouchstart' in window) {
        document.addEventListener('touchmove', () => {}, { passive: true });
      }
    }

    function handleMenuItemClick(e) {
      const item = e.currentTarget;
      const text = item.textContent.trim();
      
      if (text !== 'Дата') {
        toggleMenu();
      }
    }

    function toggleMenu() {
      document.getElementById('menuOverlay').classList.toggle('active');
    }

    function toggleModal(e) {
      e?.stopPropagation();
      document.getElementById('modalOverlay').classList.toggle('active');
    }

    function closeModalOutside(e) {
      if (e.target.id === 'modalOverlay') toggleModal();
    }

    // Animations
    function startFallingRomance() {
      const pool = [];
      const screenWidth = window.innerWidth;
      const screenHeight = window.innerHeight;

      for (let i = 0; i < CONFIG.heartCount; i++) {
        pool.push({ type: 'heart', val: '💗' });
      }
      CONFIG.letters.forEach(l => pool.push({ type: 'letter', val: l }));
      pool.sort(() => Math.random() - 0.5);

      pool.forEach((item, index) => {
        requestAnimationFrame(() => {
          const el = document.createElement('div');
          el.classList.add('falling-element', item.type === 'heart' ? 'falling-heart' : 'falling-letter');
          el.textContent = item.val;
          el.style.left = `${Math.random() * screenWidth}px`;

          document.body.appendChild(el);

          const startX = parseFloat(el.style.left);
          const endX = startX + (Math.random() - 0.5) * 200;
          const duration = CONFIG.fallingDuration.min + Math.random() * (CONFIG.fallingDuration.max - CONFIG.fallingDuration.min);

          const animation = el.animate(
            [
              { transform: 'translate3d(0, 0, 0) scale(0.3)', opacity: 0 },
              { transform: `translate3d(${endX - startX}px, ${screenHeight / 2}px, 0) scale(1)`, opacity: 1 },
              { transform: `translate3d(${endX - startX + (Math.random() - 0.5) * 50}px, ${screenHeight + 100}px, 0) scale(0.8)`, opacity: 0 }
            ],
            {
              duration: duration,
              delay: index * 80,
              fill: 'forwards',
              easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)'
            }
          );

          animation.onfinish = () => el.remove();
        });
      });
    }

    function triggerHeartsFromInitials() {
      const rect = document.getElementById('initials').getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top;

      for (let i = 0; i < CONFIG.heartsBurstCount; i++) {
        requestAnimationFrame(() => {
          const el = document.createElement('div');
          el.textContent = '💓';
          el.style.position = 'fixed';
          el.style.left = `${centerX}px`;
          el.style.top = `${centerY}px`;
          el.style.pointerEvents = 'none';
          el.style.userSelect = 'none';
          el.style.fontSize = '20px';

          document.body.appendChild(el);

          const angle = (Math.PI * 2 * i) / CONFIG.heartsBurstCount;
          const distance = 150;
          const offsetX = Math.cos(angle) * distance;
          const offsetY = Math.sin(angle) * distance - 200;

          const animation = el.animate(
            [
              { transform: 'translateY(0) scale(1)', opacity: 1 },
              { transform: `translate(${offsetX}px, ${offsetY}px) scale(0)`, opacity: 0 }
            ],
            {
              duration: CONFIG.heartsBurstDuration,
              easing: 'cubic-bezier(0.34, 1.56, 0.64, 1)',
              fill: 'forwards'
            }
          );

          animation.onfinish = () => el.remove();
        });
      }
    }

    // Timer
    function updateTimers() {
      if (currentPage === 'main') {
        const diff = Date.now() - CONFIG.startDate.getTime();
        const days = Math.floor(diff / 86400000);
        const h = Math.floor((diff / 3600000) % 24);
        const m = Math.floor((diff / 60000) % 60);
        const s = Math.floor((diff / 1000) % 60);

        document.getElementById('count').textContent = days;
        document.getElementById('liveTimerNode').textContent = `${days}д ${h}ч ${m}м ${s}с`;
      }
    }

    // Init
    function init() {
      updateTimers();
      updateTimerInterval = setInterval(updateTimers, CONFIG.updateInterval);
      setupEventListeners();
    }

    window.addEventListener('beforeunload', () => {
      if (updateTimerInterval) clearInterval(updateTimerInterval);
    });

    document.addEventListener('visibilitychange', () => {
      if (document.hidden && updateTimerInterval) {
        clearInterval(updateTimerInterval);
      } else if (!document.hidden && !updateTimerInterval) {
        updateTimers();
        updateTimerInterval = setInterval(updateTimers, CONFIG.updateInterval);
      }
    });

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>

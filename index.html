<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>Our</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; }
        body {
            height: 100dvh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            color: white;
            background: #000;
            -webkit-font-smoothing: antialiased;
        }
        .background {
            position: fixed; inset: 0;
            background-image: url("photo.JPG");
            background-size: cover; background-position: center;
            filter: brightness(0.4) saturate(1.1);
            z-index: 0;
        }
        .container {
            position: relative;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: calc(16px + env(safe-area-inset-top)) 20px calc(20px + env(safe-area-inset-bottom));
            max-width: 500px;
            margin: 0 auto;
            z-index: 1;
        }
        .location {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            align-self: flex-start;
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .location:active { transform: scale(0.94); }
        .dot {
            width: 6px; height: 6px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 8px #22c55e;
        }
        .location-text {
            font-size: 13px;
            font-weight: 500;
            opacity: 0.9;
        }
        .center {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .days {
            font-size: clamp(80px, 20vw, 140px);
            font-weight: 700;
            letter-spacing: -4px;
            text-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }
        .info {
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: center;
            opacity: 0.6;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="container">
        <div class="location" id="location">
            <div class="dot"></div>
            <div class="location-text" id="locationText">Загрузка...</div>
        </div>
        <div class="center">
            <div class="days" id="days">0</div>
        </div>
        <div class="info">
            <div>вместе</div>
        </div>
    </div>
    <script>
        const updateDays = () => {
            const start = new Date(2026, 2, 29);
            const today = new Date();
            document.getElementById("days").textContent = Math.ceil((today - start) / 8.64e7);
        };
        updateDays();
        setInterval(updateDays, 6e5);

        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(
                async (pos) => {
                    try {
                        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&format=json&accept-language=ru`);
                        const {address = {}} = await res.json();
                        document.getElementById("locationText").textContent = 
                            address.city || address.town || address.village || "Неизвестно";
                    } catch { document.getElementById("locationText").textContent = "Чехия"; }
                },
                () => { document.getElementById("locationText").textContent = "Геолокация откл."; }
            );
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Наша история ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Segoe UI',sans-serif;
    overflow:hidden;

    background:
        radial-gradient(circle at 20% 20%, #ffd1dc 0%, transparent 35%),
        radial-gradient(circle at 80% 80%, #ffb6c1 0%, transparent 40%),
        linear-gradient(135deg,#fff0f5,#ffe4ec);
}

/* ===== КАРТОЧКА ===== */
.container{
    position:relative;
    z-index:10;

    width: min(92vw, 480px);   /* 👈 главное для адаптива */
    padding: clamp(18px, 5vw, 40px);

    text-align:center;

    background:rgba(255,255,255,0.25);
    backdrop-filter:blur(22px);

    border:1px solid rgba(255,255,255,0.4);
    border-radius:30px;

    box-shadow:
        0 25px 60px rgba(255, 71, 126, 0.25),
        inset 0 0 25px rgba(255,255,255,0.2);

    animation:fadeIn 1s ease;
}

/* ===== ЗАГОЛОВОК ===== */
h1{
    font-size: clamp(20px, 6vw, 30px); /* адаптив */
    color:#ff477e;
    margin-bottom:20px;
}

/* ===== ФОТО ===== */
.photos{
    display:flex;
    justify-content:center;
    align-items:center;
    gap: clamp(10px, 4vw, 20px);
    margin-bottom:20px;
    flex-wrap:wrap;
}

.profile-pic{
    width: clamp(70px, 28vw, 120px);  /* 👈 адаптив */
    height: clamp(70px, 28vw, 120px);
    border-radius:50%;
    object-fit:cover;

    border:3px solid white;
    box-shadow:0 0 20px rgba(255,71,126,0.4);

    transition:0.3s;
}

.profile-pic:hover{
    transform:scale(1.08);
}

.heart{
    font-size: clamp(24px, 6vw, 42px);
    animation:heartbeat 1.2s infinite;
}

/* ===== ТЕКСТ ===== */
h2{
    font-size: clamp(14px, 4.5vw, 20px);
    color:#666;
}

.counter{
    font-size: clamp(28px, 8vw, 48px);
    font-weight:800;

    background:linear-gradient(45deg,#ff477e,#ff85a1,#ffb6c1);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    margin-top:10px;
}

.subtitle{
    margin-top:12px;
    font-size: clamp(12px, 3.8vw, 16px);
    color:#777;
}

.date{
    margin-top:10px;
    font-size: clamp(11px, 3.5vw, 14px);
    color:#999;
}

/* ===== АНИМАЦИИ ===== */
@keyframes heartbeat{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.25);}
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* ===== ❤️ КЛИК СЕРДЦА ===== */
.click-heart{
    position:fixed;
    pointer-events:none;
    z-index:999;
    animation:floatUp 1s ease forwards;
}

@keyframes floatUp{
    0%{transform:translateY(0) scale(1);opacity:1;}
    100%{transform:translateY(-120px) scale(1.8);opacity:0;}
}

/* ===== МЕЛКИЕ ТЕЛЕФОНЫ ===== */
@media (max-width: 380px){
    .container{
        border-radius:20px;
        padding:16px;
    }

    .photos{
        gap:10px;
    }
}
</style>
</head>

<body>

<div class="container">

    <h1>💖 Наша история 💖</h1>

    <div class="photos">
        <img src="https://i.ibb.co/6wX96xL/RTxS0hWm.jpg" class="profile-pic">
        <div class="heart">❤️</div>
        <img src="https://i.postimg.cc/ppcVFJ73/IMG-1360.jpg" class="profile-pic">
    </div>

    <h2>Мы вместе уже</h2>
    <div class="counter" id="days-counter">...</div>

    <div class="subtitle">Каждый момент с тобой ✨</div>
    <div class="date">с 01.01.2025</div>

</div>

<script>

// ===== СЧЁТЧИК =====
const YOUR_DATE = '2025-01-01';

function updateCounter(){
    const startDate = new Date(YOUR_DATE);
    const today = new Date();

    today.setHours(0,0,0,0);
    startDate.setHours(0,0,0,0);

    const days = Math.floor((today - startDate) / 86400000);

    document.getElementById("days-counter").innerText =
        (days < 0 ? 0 : days) + " дней";
}

updateCounter();


// ===== ❤️ КЛИК СЕРДЦА =====
document.addEventListener("click", (e)=>{
    const heart = document.createElement("div");
    heart.className = "click-heart";
    heart.innerHTML = "❤️";

    heart.style.left = e.clientX + "px";
    heart.style.top = e.clientY + "px";
    heart.style.fontSize = (Math.random()*10 + 14) + "px";

    document.body.appendChild(heart);

    setTimeout(()=>heart.remove(),1000);
});

</script>

</body>
</html>

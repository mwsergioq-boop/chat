<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no,maximum-scale=1">
    <meta name="theme-color" content="#000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    <link rel="preconnect" href="https://nominatim.openstreetmap.org">
    <title>Our</title>
    <style>
        :root{
            --glass:rgba(255,255,255,.05);--glass-active:rgba(255,255,255,.1);
            --blur:24px;--ease:cubic-bezier(.4,0,.2,1);
        }
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        html,body{width:100%;height:100%;overscroll-behavior:none}
        body{
            height:100dvh;overflow:hidden;
            font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
            color:#fff;background:#000;
            -webkit-font-smoothing:antialiased;
            -webkit-touch-callout:none;
            touch-action:manipulation;
        }
        .bg{
            position:fixed;inset:-30px;
            background:url("photo.JPG") center/cover no-repeat;
            filter:brightness(.32) saturate(1.2) contrast(1.08);
            z-index:0;
            transform:translate3d(0,0,0);
            transition:transform .2s ease-out;
        }
        .bg::after{
            content:"";position:absolute;inset:0;
            background:
                radial-gradient(ellipse at 50% 40%,transparent 0%,rgba(0,0,0,.5) 100%),
                linear-gradient(180deg,rgba(0,0,0,.25) 0%,transparent 35%,transparent 65%,rgba(0,0,0,.7) 100%);
        }
        .noise{
            position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.03;
            background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }
        .wrap{
            position:relative;width:100%;height:100%;
            display:flex;flex-direction:column;justify-content:space-between;
            padding:calc(20px + env(safe-area-inset-top)) 24px calc(24px + env(safe-area-inset-bottom));
            max-width:500px;margin:0 auto;z-index:1;
        }
        .loc{
            display:flex;align-items:center;gap:12px;
            padding:11px 18px;
            background:var(--glass);border-radius:24px;
            -webkit-backdrop-filter:blur(var(--blur));backdrop-filter:blur(var(--blur));
            align-self:flex-start;
            transition:transform .25s var(--ease),background .25s;
            cursor:pointer;user-select:none;-webkit-user-select:none;
            border:1px solid rgba(255,255,255,.06);
        }
        .loc:active{transform:scale(.93);background:var(--glass-active)}
        .dot-wrap{
            position:relative;width:10px;height:10px;
            display:flex;align-items:center;justify-content:center;
        }
        .dot{
            width:6px;height:6px;
            background:#22c55e;border-radius:50%;
            position:relative;z-index:2;
            box-shadow:0 0 6px rgba(34,197,94,.6);
        }
        .dot-ring{
            position:absolute;inset:0;
            border:1.5px solid rgba(34,197,94,.4);
            border-radius:50%;
            animation:ring 3s ease-out infinite;
        }
        @keyframes ring{
            0%{transform:scale(.8);opacity:1}
            100%{transform:scale(2);opacity:0}
        }
        .loc-txt{
            font-size:13px;font-weight:500;opacity:.95;
            white-space:nowrap;letter-spacing:.3px;
        }
        .skeleton{
            width:80px;height:13px;
            background:linear-gradient(90deg,rgba(255,255,255,.06) 25%,rgba(255,255,255,.15) 50%,rgba(255,255,255,.06) 75%);
            background-size:200% 100%;
            border-radius:4px;
            animation:shimmer 2s ease-in-out infinite;
        }
        @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
        .center{
            flex:1;display:flex;flex-direction:column;
            align-items:center;justify-content:center;gap:36px;
        }
        .counter{
            display:flex;flex-direction:column;align-items:center;gap:10px;
            opacity:0;animation:fadeUp 1s var(--ease) forwards;
        }
        .counter:nth-child(1){animation-delay:.15s}
        .counter:nth-child(3){animation-delay:.4s}
        @keyframes fadeUp{
            from{opacity:0;transform:translateY(30px) scale(.95)}
            to{opacity:1;transform:translateY(0) scale(1)}
        }
        .num{
            font-weight:100;letter-spacing:-8px;
            font-variant-numeric:tabular-nums;
            background:linear-gradient(180deg,#fff 0%,rgba(255,255,255,.7) 100%);
            -webkit-background-clip:text;background-clip:text;
            -webkit-text-fill-color:transparent;
            transition:opacity .5s var(--ease),transform .5s var(--ease);
            line-height:.85;
            position:relative;
        }
        .num.fade{opacity:.3;transform:scale(.98)}
        .primary .num{
            font-size:clamp(100px,28vw,180px);
            filter:drop-shadow(0 0 40px rgba(255,255,255,.05));
        }
        .secondary{opacity:.9}
        .secondary .num{
            font-size:clamp(52px,15vw,88px);
            font-weight:200;letter-spacing:-4px;
        }
        .label{
            font-size:9px;font-weight:600;
            letter-spacing:3.5px;text-transform:uppercase;opacity:.45;
        }
        .divider{
            position:relative;
            width:48px;height:1px;
            opacity:0;animation:fadeIn 1.2s var(--ease) .3s forwards;
        }
        .divider::before{
            content:"";position:absolute;inset:0;
            background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.25) 50%,transparent 100%);
        }
        .divider::after{
            content:"";position:absolute;
            left:50%;top:50%;transform:translate(-50%,-50%);
            width:3px;height:3px;
            background:rgba(255,255,255,.3);border-radius:50%;
        }
        @keyframes fadeIn{to{opacity:1}}
        .progress{
            position:fixed;bottom:0;left:0;right:0;
            height:1px;z-index:2;
            background:rgba(255,255,255,.05);
        }
        .progress-bar{
            height:100%;
            background:linear-gradient(90deg,rgba(255,255,255,.1) 0%,rgba(255,255,255,.3) 100%);
            transition:width 1s var(--ease);
            box-shadow:0 0 8px rgba(255,255,255,.2);
        }
        @media (prefers-reduced-motion:reduce){
            *{animation-duration:.01ms!important;transition-duration:.01ms!important}
        }
    </style>
</head>
<body>
    <div class="bg" id="bg"></div>
    <div class="noise"></div>
    <div class="wrap">
        <div class="loc" id="loc">
            <div class="dot-wrap">
                <div class="dot-ring"></div>
                <div class="dot"></div>
            </div>
            <div class="loc-txt" id="locTxt"><div class="skeleton"></div></div>
        </div>
        <div class="center">
            <div class="counter primary">
                <div class="num" id="daysTogether">0</div>
                <div class="label">вместе</div>
            </div>
            <div class="divider"></div>
            <div class="counter secondary">
                <div class="num" id="daysUntil">0</div>
                <div class="label">до встречи</div>
            </div>
        </div>
    </div>
    <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
    </div>
    <script>
        const C={
            START:new Date(2026,2,29),
            MEET:new Date(2026,9,15),
            DAY:864e5,
            UPDATE:6e5,
            GEO_TIMEOUT:1e4,
            CACHE:"our_loc"
        };
        
        const $=id=>document.getElementById(id);
        const daysTogether=$("daysTogether"),daysUntil=$("daysUntil"),locTxt=$("locTxt"),bg=$("bg"),progressBar=$("progressBar");
        
        const setNum=(el,val)=>{
            if(el.textContent!==String(val)){
                el.classList.add("fade");
                setTimeout(()=>{
                    el.textContent=val;
                    el.classList.remove("fade");
                    if(el===daysTogether)navigator.vibrate?.(5);
                },250);
            }
        };
        
        const update=()=>{
            const now=new Date();
            const together=Math.floor((now-C.START)/C.DAY);
            const until=Math.max(0,Math.ceil((C.MEET-now)/C.DAY));
            const total=(C.MEET-C.START)/C.DAY;
            const progress=Math.min(100,Math.max(0,((now-C.START)/C.DAY)/total*100));
            
            setNum(daysTogether,together);
            setNum(daysUntil,until);
            progressBar.style.width=progress+"%";
        };
        
        update();
        setInterval(update,C.UPDATE);
        
        // Параллакс через touch
        let startX=0,startY=0;
        document.addEventListener("touchstart",e=>{
            startX=e.touches[0].clientX;
            startY=e.touches[0].clientY;
        },{passive:true});
        
        document.addEventListener("touchmove",e=>{
            const dx=(e.touches[0].clientX-startX)*.025;
            const dy=(e.touches[0].clientY-startY)*.025;
            bg.style.transform=`translate3d(${dx}px,${dy}px,0)`;
        },{passive:true});
        
        document.addEventListener("touchend",()=>{
            bg.style.transform="translate3d(0,0,0)";
        },{passive:true});
        
        // Локация с кэшированием
        const setLoc=(text,cache=false)=>{
            locTxt.textContent=text;
            if(cache)try{localStorage.setItem(C.CACHE,JSON.stringify({text,time:Date.now()}))}catch{}
        };
        
        const getCached=()=>{
            try{
                const c=JSON.parse(localStorage.getItem(C.CACHE));
                if(c&&Date.now()-c.time<864e5){setLoc(c.text);return true}
            }catch{}
            return false;
        };
        
        getCached();
        
        if("geolocation"in navigator){
            navigator.geolocation.getCurrentPosition(
                async pos=>{
                    try{
                        const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&format=json&accept-language=ru`);
                        if(!r.ok)throw 0;
                        const{address:a={}}=await r.json();
                        setLoc(a.city||a.town||a.village||"Неизвестно",true);
                    }catch{if(!getCached())setLoc("Чехия")}
                },
                ()=>{if(!getCached())setLoc("Геолокация откл.")},
                {timeout:C.GEO_TIMEOUT,enableHighAccuracy:false,maximumAge:36e5}
            );
        }else if(!getCached()){
            setLoc("Геолокация не поддерживается");
        }
        
        // Блокировка zoom
        let lastTouch=0;
        document.addEventListener("touchend",e=>{
            const now=Date.now();
            if(now-lastTouch<=300)e.preventDefault();
            lastTouch=now;
        },{passive:false});
    </script>
</body>
</html>

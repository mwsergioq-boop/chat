<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Days</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body{
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
}

#counter{
    color:#fff;
    font-size:15vw;
    font-weight:700;
    line-height:1;
    user-select:none;
}

#clock{
    position:absolute;
    bottom:25px;
    color:#555;
    font-size:18px;
    font-weight:400;
    letter-spacing:2px;
    user-select:none;
}
</style>

</head>

<body>

<div id="counter">0</div>

<div id="clock">00:00:00</div>


<script>

const startDate = new Date("2026-03-29T00:00:00");


// счётчик дней
function updateDays(){

    const now = new Date();
    const diff = now - startDate;

    const days = Math.floor(
        diff / (1000 * 60 * 60 * 24)
    );

    document.getElementById("counter").textContent = days;
}


// часы
function updateClock(){

    const now = new Date();

    const hours = String(now.getHours()).padStart(2,"0");
    const minutes = String(now.getMinutes()).padStart(2,"0");
    const seconds = String(now.getSeconds()).padStart(2,"0");

    document.getElementById("clock").textContent =
        `${hours}:${minutes}:${seconds}`;
}


updateDays();
updateClock();

setInterval(updateClock,1000);

</script>

</body>
</html>

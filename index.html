<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дни</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .header {
            background: #0a0a0a;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #222;
            flex-shrink: 0;
        }
        
        .dot {
            width: 16px;
            height: 16px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 12px #22c55e,
                        0 0 22px rgba(34, 197, 94, 0.8);
        }
        
        .country {
            font-size: 1.45rem;
            font-weight: 600;
            color: #22c55e;
        }
        
        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .days {
            font-size: 9rem;
            font-weight: 700;
            color: #ffffff;
            line-height: 1;
            letter-spacing: -6px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="dot"></div>
        <div class="country" id="country">Определяем...</div>
    </div>
    
    <div class="main">
        <div class="days" id="days">0</div>
    </div>

    <script>
        function calculateDays() {
            const start = new Date(2026, 1, 29); // 29 февраля 2026
            const today = new Date();
            const diff = Math.ceil((today - start) / (1000 * 60 * 60 * 24));
            document.getElementById('days').textContent = diff;
        }

        // Геолокация для страны
        navigator.geolocation.getCurrentPosition(async (pos) => {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&format=json&accept-language=ru`);
                const data = await res.json();
                const country = data.address?.country || "Чехия";
                document.getElementById('country').textContent = `• ${country}`;
            } catch(e) {
                document.getElementById('country').textContent = "• Чехия";
            }
        }, () => {
            document.getElementById('country').textContent = "• Чехия";
        });

        calculateDays();
        setInterval(calculateDays, 600000); // обновление каждые 10 минут
    </script>
</body>
</html>

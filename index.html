<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Счетчик Времени</title>
  <style>
    :root {
      --bg-color: #000000;
      --text-color: #ffffff;
      --glow-color: rgba(255, 46, 147, 0.45);
      --shadow-color: rgba(255, 46, 147, 0.5);
      --shadow-color-intense: rgba(255, 105, 180, 0.85);
      --subtext-color: rgba(255, 255, 255, 0.5);
    }

    body.theme-wine {
      --bg-color: #14000a;
      --glow-color: rgba(255, 46, 147, 0.6);
      --shadow-color: rgba(255, 46, 147, 0.7);
      --shadow-color-intense: #ff65a3;
    }

    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg-color);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      box-sizing: border-box;
      padding: 20px;
      position: relative;
      transition: background 0.8s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .pulse-dot-btn {
      position: absolute;
      top: 50px;
      z-index: 10;
      width: 14px;
      height: 14px;
      background-color: #ff2e93;
      border-radius: 50%;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 0 15px #ff2e93, 0 0 30px #ff2e93, 0 0 45px #ff2e93;
      animation: dot-super-pulse 1.5s infinite ease-in-out;
      transition: transform 0.1s;
    }

    .pulse-dot-btn:active { transform: scale(0.75); }

    @keyframes dot-super-pulse {
      0% { box-shadow: 0 0 12px #ff2e93, 0 0 25px #ff2e93, 0 0 35px #ff2e93; transform: scale(1); }
      50% { box-shadow: 0 0 25px #ff2e93, 0 0 50px #ff2e93, 0 0 75px #ff2e93, 0 0 100px #ff2e93; transform: scale(1.3); }
      100% { box-shadow: 0 0 12px #ff2e93, 0 0 25px #ff2e93, 0 0 35px #ff2e93; transform: scale(1); }
    }

    .falling-element {
      position: absolute;
      pointer-events: none;
      user-select: none;
      z-index: 9;
      will-change: transform, opacity;
      top: -50px;
    }

    .falling-heart { filter: drop-shadow(0 0 8px rgba(255, 46, 147, 0.4)); }
    .falling-letter { font-weight: 700; color: #ffffff; text-shadow: 0 0 15px #ff2e93, 0 0 30px #ff2e93; font-family: 'Georgia', serif; }

    .info-btn {
      position: absolute;
      top: 47px;
      right: 30px;
      color: rgba(255, 255, 255, 0.25);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      z-index: 10;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.3s;
    }
    .info-btn:active { color: rgba(255, 255, 255, 0.8); }

    .counter-wrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      pointer-events: none;
    }

    .counter-wrapper::before {
      content: '';
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 140%;
      height: 140%;
      background: radial-gradient(circle, var(--glow-color) 0%, rgba(0,0,0,0) 70%);
      z-index: -1;
      filter: blur(50px);
      animation: glow-pulse 4s ease-in-out infinite alternate;
      transition: background 0.8s ease;
    }

    .status-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 4px;
      color: rgba(255, 46, 147, 0.7);
      text-transform: uppercase;
      margin-bottom: 5px;
      text-shadow: 0 0 8px rgba(255, 46, 147, 0.3);
    }

    .counter {
      font-size: 150px;
      font-weight: 700;
      text-align: center;
      color: var(--text-color);
      margin: 0;
      line-height: 1;
      animation: heartbeat 1.8s ease-in-out infinite alternate;
    }

    .live-timer {
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 3px;
      color: var(--subtext-color);
      margin-top: 20px;
      text-transform: uppercase;
      font-variant-numeric: tabular-nums;
      text-align: center;
    }

    .initials {
      position: absolute;
      bottom: 35px;
      font-size: 13px;
      font-weight: 200;
      letter-spacing: 7px;
      color: rgba(255, 255, 255, 0.25);
      text-transform: uppercase;
      user-select: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.3s;
    }
    .initials:active { color: rgba(255, 255, 255, 0.6); }

    @keyframes heartbeat {
      0% { text-shadow: 0 0 40px var(--shadow-color); transform: scale(1); }
      100% { text-shadow: 0 0 65px var(--shadow-color-intense); transform: scale(1.03); }
    }

    @keyframes glow-pulse {
      0% { opacity: 0.4; transform: translate(-50%, -50%) scale(0.9); }
      100% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.1); }
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      z-index: 100;
    }

    .modal-overlay.active { opacity: 1; pointer-events: auto; }

    .modal-content {
      background: #0d0d0d;
      border: 1px solid rgba(255, 46, 147, 0.2);
      padding: 30px;
      border-radius: 24px;
      width: 85%;
      max-width: 340px;
      color: #fff;
      box-shadow: 0 20px 50px rgba(255, 46, 147, 0.15);
      transform: translateY(20px);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .modal-overlay.active .modal-content { transform: translateY(0); }
    .modal-title { font-size: 19px; font-weight: 700; margin: 0 0 15px 0; color: #ff2e93; border-bottom: 1px solid rgba(255, 255, 255, 0.08); padding-bottom: 10px; text-align: center; }
    .modal-list { padding-left: 15px; margin: 0 0 20px 0; }
    .modal-list li { margin-bottom: 12px; font-size: 14px; line-height: 1.5; color: rgba(255, 255, 255, 0.75); }
    .close-btn { display: block; width: 100%; padding: 12px; background: linear-gradient(90deg, #ff2e93, #ff65a3); border: none; border-radius: 12px; color: white; font-weight: 600; font-size: 14px; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 46, 147, 0.3); }

    @media (max-width: 768px) { .counter { font-size: 110px; } .live-timer { font-size: 12px; letter-spacing: 2px; } }
    @media (max-width: 450px) { .counter { font-size: 85px; } .live-timer { font-size: 11px; letter-spacing: 1.5px; } }
    @media (max-width: 360px) { .counter { font-size: 75px; } }
  </style>
</head>
<body ondblclick="toggleTheme(event)">

  <div class="pulse-dot-btn" id="pulseBtn" onclick="startFallingRomance()"></div>
  <div class="info-btn" onclick="toggleModal(event)">?</div>

  <div class="counter-wrapper">
    <div class="status-label">Мы вместе</div>
    <div class="counter"><span id="count">0</span></div>
    <div class="live-timer" id="liveTimerNode">0д 0ч 0м 0с</div>
  </div>

  <div class="initials" id="initials" onclick="triggerHeartsFromInitials()">D + S</div>

  <div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
    <div class="modal-content">
      <h3 class="modal-title">Справка</h3>
      <ul class="modal-list">
        <li>Розовая точка: Романтичный листопад</li>
        <li>D + S: Маленький салют сердец</li>
        <li>2 тапа по экрану: Смена темы</li>
      </ul>
      <button class="close-btn" onclick="toggleModal(event)">Понятно</button>
    </div>
  </div>

  <script>
    const setYear = 2026;
    const setMonth = 2;
    const setDay = 29;

    const startDate = new Date(setYear, setMonth, setDay);

    function toggleTheme(e) {
      if (e.target.closest('.pulse-dot-btn') || e.target.closest('.info-btn') || e.target.closest('.modal-content') || e.target.id === 'initials') return;
      document.body.classList.toggle('theme-wine');
    }

    function startFallingRomance() {
      const heartCount = 50; 
      const pool = [];
      const letters = ['D', 'S'];
      const screenWidth = window.innerWidth;
      const screenHeight = window.innerHeight;

      for (let i = 0; i < heartCount; i++) pool.push({ type: 'heart', val: '💗' });
      letters.forEach(l => pool.push({ type: 'letter', val: l }));
      pool.sort(() => Math.random() - 0.5);

      pool.forEach((item, index) => {
        const el = document.createElement('div');
        el.classList.add('falling-element', item.type === 'heart' ? 'falling-heart' : 'falling-letter');
        el.textContent = item.val;

        const startX = Math.random() * screenWidth;
        el.style.left = `${startX}px`;

        let scale = Math.random() * 0.6 + 0.4;
        let fontSize = item.type === 'letter' ? Math.random() * 8 + 26 : Math.random() * 10 + 16;
        
        el.style.fontSize = `${fontSize}px`;
        document.body.appendChild(el);

        const duration = Math.random() * 4000 + 5000;
        const delay = index * (Math.random() * 120 + 60);
        const finalX = startX + (Math.random() * 160 - 80);

        el.animate([
          { transform: `translate3d(0, 0, 0) scale(0.3) rotate(0deg)`, opacity: 0 },
          { opacity: 0.9, transform: `translate3d(${Math.random() * 80 + 40}px, ${screenHeight * 0.28}px, 0) scale(${scale}) rotate(${Math.random() * 45 - 22}deg)`, offset: 0.25 },
          { transform: `translate3d(${-Math.random() * 80 - 40}px, ${screenHeight * 0.65}px, 0) scale(${scale}) rotate(${Math.random() * 90 - 45}deg)`, opacity: 0.8, offset: 0.65 },
          { transform: `translate3d(${finalX - startX}px, ${screenHeight + 70}px, 0) scale(${scale * 0.8}) rotate(${Math.random() * 180 - 90}deg)`, opacity: 0 }
        ], { duration, delay, easing: 'cubic-bezier(0.33, 0.46, 0.66, 0.94)', fill: 'forwards' }).onfinish = () => el.remove();
      });
    }

    function triggerHeartsFromInitials() {
      const heartCount = 15; 
      const rect = document.getElementById('initials').getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;

      for (let i = 0; i < heartCount; i++) {
        const el = document.createElement('div');
        el.classList.add('falling-element', 'falling-heart');
        el.textContent = '💗';
        el.style.left = `${centerX}px`;
        el.style.top = `${centerY}px`;
        el.style.fontSize = '20px';
        document.body.appendChild(el);

        const angle = Math.random() * Math.PI * 2;
        const velocity = Math.random() * 100 + 50;
        const destX = centerX + Math.cos(angle) * velocity;
        const destY = centerY + Math.sin(angle) * velocity - 200;

        el.animate([
          { transform: 'scale(0) translateY(0)', opacity: 1 },
          { transform: `translate(${destX - centerX}px, ${destY - centerY}px) scale(1.5)`, opacity: 0 }
        ], { 
          duration: 1000, 
          easing: 'cubic-bezier(0, 0, 0.2, 1)' 
        }).onfinish = () => el.remove();
      }
    }

    function updateTimers() {
      const now = new Date();
      const countNode = document.getElementById('count');
      const timerNode = document.getElementById('liveTimerNode');

      if (startDate > now || isNaN(startDate.getTime())) {
        countNode.textContent = "Err";
        timerNode.textContent = "Ошибка даты!";
        return;
      }

      const diff = now - startDate;
      const days = Math.floor(diff / 86400000);
      const hours = Math.floor((diff / 3600000) % 24);
      const minutes = Math.floor((diff / 60000) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      if (!isNaN(days) && days >= 0) {
        countNode.textContent = days;
        timerNode.textContent = `${days}д ${hours}ч ${minutes}м ${seconds}с`;
      }
    }

    function toggleModal(e) { 
      if(e) e.stopPropagation();
      document.getElementById('modalOverlay').classList.toggle('active'); 
    }
    function closeModalOutside(e) { if (e.target.id === 'modalOverlay') toggleModal(e); }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('data:text/javascript;base64,' + btoa(`
        const CACHE_NAME = 'counter-v${Date.now()}';
        self.addEventListener('install', e => self.skipWaiting());
        self.addEventListener('activate', e => {
          e.waitUntil(caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k)))).then(() => self.clients.claim()));
        });
        self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => caches.match(e.request))));
      `), { scope: './' });
    }

    updateTimers();
    setInterval(updateTimers, 1000);
  </script>
</body>
</html>

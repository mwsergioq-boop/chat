<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CHSD</title>
  <style>
    :root {
      --bg-color: #000000;
      --text-color: #ffffff;
      --subtext-color: rgba(255, 255, 255, 0.5);
    }

    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg-color);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      box-sizing: border-box;
      padding: 20px;
    }

    .pulse-dot-btn {
      position: absolute;
      top: 50px;
      z-index: 10;
      width: 14px;
      height: 14px;
      background-color: #ff2e93;
      border-radius: 50%;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 0 15px #ff2e93, 0 0 30px #ff2e93, 0 0 45px #ff2e93;
      animation: dot-super-pulse 1.5s infinite ease-in-out;
      transition: transform 0.1s;
    }

    .pulse-dot-btn:active { transform: scale(0.75); }

    @keyframes dot-super-pulse {
      0% { box-shadow: 0 0 12px #ff2e93, 0 0 25px #ff2e93, 0 0 35px #ff2e93; transform: scale(1); }
      50% { box-shadow: 0 0 25px #ff2e93, 0 0 50px #ff2e93, 0 0 75px #ff2e93, 0 0 100px #ff2e93; transform: scale(1.3); }
      100% { box-shadow: 0 0 12px #ff2e93, 0 0 25px #ff2e93, 0 0 35px #ff2e93; transform: scale(1); }
    }

    .falling-element {
      position: absolute;
      pointer-events: none;
      user-select: none;
      z-index: 9;
      will-change: transform, opacity;
      top: -50px;
    }

    .falling-heart { filter: drop-shadow(0 0 8px rgba(255, 46, 147, 0.4)); }
    .falling-letter { font-weight: 700; color: #ffffff; text-shadow: 0 0 15px #ff2e93, 0 0 30px #ff2e93; font-family: 'Georgia', serif; }

    .info-btn {
      position: absolute;
      top: 47px;
      right: 30px;
      color: rgba(255, 255, 255, 0.25);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      z-index: 10;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.3s;
    }
    .info-btn:active { color: rgba(255, 255, 255, 0.8); }

    .counter-wrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      pointer-events: none;
    }

    .status-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 4px;
      color: rgba(255, 46, 147, 0.7);
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .counter {
      font-size: 150px;
      font-weight: 700;
      text-align: center;
      color: var(--text-color);
      margin: 0;
      line-height: 1;
      animation: heartbeat 1.8s ease-in-out infinite alternate;
    }

    @keyframes heartbeat {
      0% { transform: scale(1); }
      100% { transform: scale(1.03); }
    }

    .live-timer {
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 3px;
      color: var(--subtext-color);
      margin-top: 20px;
      text-transform: uppercase;
      font-variant-numeric: tabular-nums;
      text-align: center;
    }

    .initials {
      position: absolute;
      bottom: 35px;
      font-size: 13px;
      font-weight: 200;
      letter-spacing: 7px;
      color: rgba(255, 255, 255, 0.25);
      text-transform: uppercase;
      user-select: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.3s;
    }
    .initials:active { color: rgba(255, 255, 255, 0.6); }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      z-index: 100;
    }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    .modal-content { background: #0d0d0d; border: 1px solid rgba(255, 46, 147, 0.2); padding: 30px; border-radius: 24px; width: 85%; max-width: 340px; color: #fff; transform: translateY(20px); transition: transform 0.4s; }
    .modal-overlay.active .modal-content { transform: translateY(0); }
    .modal-title { font-size: 19px; font-weight: 700; margin: 0 0 15px 0; color: #ff2e93; border-bottom: 1px solid rgba(255, 255, 255, 0.08); padding-bottom: 10px; text-align: center; }
    .modal-list { padding-left: 15px; margin: 0 0 20px 0; }
    .modal-list li { margin-bottom: 12px; font-size: 14px; color: rgba(255, 255, 255, 0.75); }
    .close-btn { display: block; width: 100%; padding: 12px; background: #ff2e93; border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; }

    @media (max-width: 768px) { .counter { font-size: 110px; } }
    @media (max-width: 450px) { .counter { font-size: 85px; } }
  </style>
</head>
<body>

  <div class="pulse-dot-btn" id="pulseBtn" onclick="startFallingRomance()"></div>
  <div class="info-btn" onclick="toggleModal(event)">?</div>

  <div class="counter-wrapper">
    <div class="status-label">together</div>
    <div class="counter"><span id="count">0</span></div>
    <div class="live-timer" id="liveTimerNode">0д 0ч 0м 0с</div>
  </div>

  <div class="initials" id="initials" onclick="triggerHeartsFromInitials()">D & S</div>

  <div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
    <div class="modal-content">
      <h3 class="modal-title">V1.3b</h3>
      <ul class="modal-list">
        <li>Real-time synchronization, Heart-burst interaction effect, DOM tree refactoring, Memory leak resolution, UI/UX refinement, Asset optimization, Deployment pipeline automation</li>
      </ul>
      <button class="close-btn" onclick="toggleModal(event)">Понятно</button>
    </div>
  </div>

  <script>
    const startDate = new Date(2026, 2, 29);

    function startFallingRomance() {
      const heartCount = 50; 
      const pool = [];
      const letters = ['D', 'S'];
      const screenWidth = window.innerWidth;
      const screenHeight = window.innerHeight;

      for (let i = 0; i < heartCount; i++) pool.push({ type: 'heart', val: '💗' });
      letters.forEach(l => pool.push({ type: 'letter', val: l }));
      pool.sort(() => Math.random() - 0.5);

      pool.forEach((item, index) => {
        const el = document.createElement('div');
        el.classList.add('falling-element', item.type === 'heart' ? 'falling-heart' : 'falling-letter');
        el.textContent = item.val;
        const startX = Math.random() * screenWidth;
        el.style.left = `${startX}px`;
        el.style.fontSize = `${item.type === 'letter' ? 30 : 20}px`;
        document.body.appendChild(el);

        el.animate([
          { transform: `translate3d(0, 0, 0) scale(0.3)`, opacity: 0 },
          { transform: `translate3d(${Math.random()*100}px, ${screenHeight/2}px, 0) scale(1)`, opacity: 1 },
          { transform: `translate3d(${Math.random()*50}px, ${screenHeight + 100}px, 0) scale(0.8)`, opacity: 0 }
        ], { duration: 5000 + Math.random()*3000, delay: index * 100, fill: 'forwards' }).onfinish = () => el.remove();
      });
    }

    function triggerHeartsFromInitials() {
      const rect = document.getElementById('initials').getBoundingClientRect();
      for (let i = 0; i < 10; i++) {
        const el = document.createElement('div');
        el.textContent = '💓';
        el.style.position = 'fixed';
        el.style.left = `${rect.left + rect.width/2}px`;
        el.style.top = `${rect.top}px`;
        document.body.appendChild(el);
        el.animate([{transform: 'translateY(0) scale(1)', opacity: 1}, {transform: 'translateY(-200px) scale(0)', opacity: 0}], {duration: 1000}).onfinish = () => el.remove();
      }
    }

    function updateTimers() {
      const diff = new Date() - startDate;
      const days = Math.floor(diff / 86400000);
      const h = Math.floor((diff / 3600000) % 24);
      const m = Math.floor((diff / 60000) % 60);
      const s = Math.floor((diff / 1000) % 60);
      document.getElementById('count').textContent = days;
      document.getElementById('liveTimerNode').textContent = `${days}д ${h}ч ${m}м ${s}с`;
    }

    function toggleModal(e) { e.stopPropagation(); document.getElementById('modalOverlay').classList.toggle('active'); }
    function closeModalOutside(e) { if (e.target.id === 'modalOverlay') toggleModal(e); }

    setInterval(updateTimers, 1000);
    updateTimers();
  </script>
</body>
</html>
